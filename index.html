        // Saldo line (blue, solid)
        svgChart += '<polyline points="'+pts(saldos)+'" fill="none" stroke="#3D8EF0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
        // Dots and labels on saldo line
        saldos.forEach(function(v,i){
          svgChart += '<circle cx="'+px(i)+'" cy="'+py(v)+'" r="3" fill="#3D8EF0"/>';

        svgChart += '<line x1="105" y1="'+(H-2)+'" x2="115" y2="'+(H-2)+'" stroke="rgba(240,68,56,0.5)" stroke-width="1.5" stroke-dasharray="3,2"/>';
        svgChart += '<text x="118" y="'+(H+1)+'" font-size="7" fill="rgba(255,255,255,0.5)">Gastos</text>';
        svgChart += '</svg></div>';
        html += svgChart;
      }

      // Summary totals
      var totalRes = cierres.reduce(function(s,c){return s+c.resultado;},0);
      var totalIng = cierres.reduce(function(s,c){return s+c.ingresos;},0);

  function inicioNav(dir) {
    if (dir === 0) { viewY = TY; viewM = TM; }
    else {
      viewM += dir;
      if (viewM > 11) { viewM = 0; viewY++; }
      if (viewM < 0) { viewM = 11; viewY--; }
      // Allow up to 6 months ahead
      var maxM = TM + 6; var maxY = TY;
      while (maxM > 11) { maxM -= 12; maxY++; }
      if (viewY > maxY || (viewY === maxY && viewM > maxM)) { viewY = maxY; viewM = maxM; }
    }
    render();
  }

      '</div>'
    );
    // Live diff preview
    setTimeout(function() {
      var inp = document.getElementById('aj_nuevo');
      var diff = document.getElementById('aj_diff');
      if (!inp || !diff) return;
      function updateDiff() {
        var nuevo = parseFloat(inp.value) || 0;
        var delta = nuevo - a.saldo;
        if (Math.abs(delta) < 0.01) {
          diff.textContent = 'Sin cambio';
          diff.style.color = 'var(--dim)';
        } else {
          diff.textContent = (delta > 0 ? '+' : '') + delta.toLocaleString('es-AR',{minimumFractionDigits:2}) + ' ARS';
          diff.style.color = delta > 0 ? 'var(--green)' : 'var(--red)';
        }
      }
      inp.addEventListener('input', updateDiff);

  function previewTransferencia() {
    var desdeEl = document.getElementById('tr_desde');
    var haciaEl = document.getElementById('tr_hacia');
    var montoEl = document.getElementById('tr_monto');
    var prev = document.getElementById('tr_preview');
    if (!desdeEl || !prev) return;
    var desde = S.cuentas.find(function(a){return a.id===desdeEl.value;});
    var monto = parseFloat(montoEl.value) || 0;
    if (desde && monto > 0) {
      var saldoPost = desde.saldo - monto;
      prev.textContent = 'Saldo restante en ' + desde.nombre.split(' ')[0] + ': ' + (desde.moneda==='USD'?'U$D':'$') + Math.abs(saldoPost).toLocaleString('es-AR',{maximumFractionDigits:2}) + (saldoPost < 0 ? ' (INSUFICIENTE)' : '');
      prev.style.color = saldoPost < 0 ? 'var(--red)' : 'var(--dim)';
    }

  function confirmarTransferencia() {
    var desdeId = document.getElementById('tr_desde').value;
    var haciaId = document.getElementById('tr_hacia').value;
    var monto = parseFloat(document.getElementById('tr_monto').value) || 0;
    var fecha = document.getElementById('tr_fecha').value;
    var desc = document.getElementById('tr_desc').value.trim() || 'Transferencia entre cuentas';
    if (desdeId === haciaId) { showAlert('Las cuentas de origen y destino deben ser distintas'); return; }
    if (!monto || monto <= 0) { showAlert('Ingresa un monto valido'); return; }
    var desde = S.cuentas.find(function(a){return a.id===desdeId;});
    var hacia = S.cuentas.find(function(a){return a.id===haciaId;});
    if (!desde || !hacia) return;
    // Debit origin
    if (desde.moneda === 'USD' && hacia.moneda === 'ARS') {
      desde.saldo = Math.max(0, desde.saldo - monto);
      hacia.saldo += monto * S.config.tipoCambio;
    } else if (desde.moneda === 'ARS' && hacia.moneda === 'USD') {
      desde.saldo = Math.max(0, desde.saldo - monto);
      hacia.saldo += monto / S.config.tipoCambio;
    } else {
      desde.saldo = Math.max(0, desde.saldo - monto);
      hacia.saldo += monto;
    }
    // Register two movements for history
    var montoARS = desde.moneda === 'USD' ? monto * S.config.tipoCambio : monto;
    S.movimientos.push({id: uid(), fecha: fecha, tipo: 'gasto', cat: 'Transferencia', desc: desc + ' (salida de ' + desde.nombre.split(' ')[0] + ')', cuentaId: desdeId, monto: montoARS, formaPago: 'Transferencia'});
    S.movimientos.push({id: uid(), fecha: fecha, tipo: 'ingreso', cat: 'Transferencia', desc: desc + ' (entrada a ' + hacia.nombre.split(' ')[0] + ')', cuentaId: haciaId, monto: hacia.moneda === 'USD' ? monto * S.config.tipoCambio : montoARS, formaPago: 'Transferencia'});
    save(); closeM(); render();
    var t = document.getElementById('TOAST');
    t.textContent = 'Transferencia de ' + (desde.moneda==='USD'?'U$D':'$') + monto.toLocaleString('es-AR',{maximumFractionDigits:2}) + ' de ' + desde.nombre.split(' ')[0] + ' a ' + hacia.nombre.split(' ')[0] + ' OK';
    t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3000);
  }

  function pgMovimientos() {
    var ing = ingMov(TY, TM), gas = gasMov(TY, TM);
    var mvs = S.movimientos.slice().sort(function(a, b) { return b.fecha.localeCompare(a.fecha); });
    if (movFiltro === 'ingreso') mvs = mvs.filter(function(m) { return m.tipo === 'ingreso'; });
    if (movFiltro === 'gasto') mvs = mvs.filter(function(m) { return m.tipo === 'gasto'; });
    if (movCuenta !== 'todas') mvs = mvs.filter(function(m) { return m.cuentaId === movCuenta; });
    if (movBusq) {
      var q = movBusq.toLowerCase().trim();
      mvs = mvs.filter(function(m) {
        var descMatch = (m.desc || '').toLowerCase().indexOf(q) >= 0;
        var catMatch  = (m.cat || '').toLowerCase().indexOf(q) >= 0;
        // Also match by amount (exact or partial)
        var montoStr = m.monto ? m.monto.toLocaleString('es-AR') : '';
        var montoMatch = montoStr.indexOf(q) >= 0 || String(m.monto).indexOf(q) >= 0;
        return descMatch || catMatch || montoMatch;
      });
    }

    var byDate = {};
    mvs.forEach(function(m) { if (!byDate[m.fecha]) byDate[m.fecha] = []; byDate[m.fecha].push(m); });
    var dates = Object.keys(byDate).sort(function(a, b) { return b.localeCompare(a); });

    var html = '<div class="page">' +
      '<div class="page-title">Movimientos</div>' +
      '<div class="g2" style="margin-bottom:9px">' +
        '<div class="mc" style="border-top:2px solid var(--green)"><div class="lbl">Ingresos mes</div><div style="font-size:13px;font-weight:700;color:var(--green);margin-top:3px">' + fmtK(ing) + '</div></div>' +
        '<div class="mc" style="border-top:2px solid var(--red)"><div class="lbl">Gastos mes</div><div style="font-size:13px;font-weight:700;color:var(--red);margin-top:3px">' + fmtK(gas) + '</div></div>' +
      '</div>' +
      '<div class="tabs">' +
        '<button class="tab ' + (movFiltro === 'todos' ? 'on' : '') + '" onclick="try{APP.setMovFiltro(\'todos\')}catch(e){console.log(e)}">Todos</button>' +
        '<button class="tab ' + (movFiltro === 'ingreso' ? 'on' : '') + '" onclick="try{APP.setMovFiltro(\'ingreso\')}catch(e){console.log(e)}">Ingresos</button>' +
        '<button class="tab ' + (movFiltro === 'gasto' ? 'on' : '') + '" onclick="try{APP.setMovFiltro(\'gasto\')}catch(e){console.log(e)}">Gastos</button>' +
      '</div>' +
      '<div style="display:flex;gap:5px;margin-bottom:8px;overflow-x:auto;padding-bottom:2px">' +
        '<button class="btn btn-sm ' + (movCuenta === 'todas' ? 'btn-p' : 'btn-s') + '" onclick="try{APP.setMovCuenta(\'todas\')}catch(e){console.log(e)}">Todas</button>' +
        S.cuentas.map(function(a) { return '<button class="btn btn-sm ' + (movCuenta === a.id ? 'btn-p' : 'btn-s') + '" onclick="try{APP.setMovCuenta(\'' + a.id + '\')}catch(e){console.log(e)}" style="white-space:nowrap">' + a.icon + ' ' + a.nombre.split(' ')[0] + '</button>'; }).join('') +
      '</div>' +
      '<input class="inp" style="margin-bottom:9px" placeholder="\uD83D\uDD0D Buscar..." value="' + movBusq + '" oninput="APP.setMovBusq(this.value)"/>' +
      '<div class="card" style="padding:11px">';

    if (movBusq && mvs.length > 0) {
      html += '<div style="font-size:10px;color:var(--dim);margin-bottom:6px;text-align:right">' + mvs.length + ' resultado' + (mvs.length!==1?'s':'') + ' para "' + movBusq + '"</div>';
    }
    if (!mvs.length) {
      html += '<div style="text-align:center;padding:20px;color:var(--dim)"><div style="font-size:32px;margin-bottom:8px">\uD83D\uDCCB</div><div style="font-size:12px">' + (movBusq ? 'Sin resultados para "' + movBusq + '"' : 'Sin movimientos.<br>Tocá + para agregar.') + '</div></div>';
    } else {
      dates.forEach(function(fecha) {
        var d = new Date(fecha + 'T12:00:00');
        var dL = DS[d.getDay()] + ' ' + d.getDate() + ' ' + MC[d.getMonth()] + ' ' + d.getFullYear();
        var items = byDate[fecha];
        var totD = items.reduce(function(s, m) { return s + (m.tipo === 'ingreso' ? m.monto : -m.monto); }, 0);
        html += '<div style="margin-bottom:12px">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:6px">' +
            '<span style="font-size:9px;font-weight:700;color:var(--dim)">' + dL + '</span>' +
            '<span style="font-size:10px;font-weight:700;font-family:\'JetBrains Mono\';color:' + (totD >= 0 ? 'var(--green)' : 'var(--red)') + '">' + (totD >= 0 ? '+' : '') + fmtK(totD) + '</span>' +
          '</div>';
        items.forEach(function(m) {
          var acct = S.cuentas.find(function(a) { return a.id === m.cuentaId; });
          html += '<div class="item-row">' +
            '<div class="item-icon" style="background:' + (m.tipo === 'ingreso' ? 'var(--green-glow)' : 'var(--red-glow)') + '">' + getCatEmoji(m.cat) + '</div>' +

              '<button class="del-btn" data-del="mov" data-id="' + m.id + '">x</button>' +
            '</div>' +
          '</div>';
        });
        html += '</div>';
      });
    }

    html += '</div><button class="btn btn-s btn-w" style="margin-top:6px" data-action="exportCSV">\uD83D\uDCE5 Exportar CSV</button></div>';
    return html;
  }

  function autoCategoria(desc) {
    if (!desc) return '';
    var d = desc.toLowerCase().trim();
    for (var cat in CAT_RULES) {
      var words = CAT_RULES[cat];
      for (var i = 0; i < words.length; i++) {
        if (d.indexOf(words[i]) >= 0) return cat;
      }
    }
    return '';
  }

  function updMovCats() {
    var t = document.getElementById('mv_t').value;
    var cats = t === 'ingreso' ? getCatsIngreso() : getCatsGasto();

  function saveMov(editId) {
    var f = document.getElementById('mv_f').value, t = document.getElementById('mv_t').value;
    var catVal = document.getElementById('mv_c').value, d = document.getElementById('mv_d').value.trim();
    var fp = document.getElementById('mv_fp').value, ac = document.getElementById('mv_ac').value;
    var m = +document.getElementById('mv_m').value;
    if (!f || !d || !m) return showAlert('Completa todos los campos');
    var cuenta = S.cuentas.find(function(a){ return a.id === ac; });
    if (editId) {
      // Editing: reverse old effect on account, apply new
      var mv = S.movimientos.find(function(x) { return x.id === editId; });
      if (mv && mv.cuentaId) {
        var oldCuenta = S.cuentas.find(function(a){ return a.id === mv.cuentaId; });
        if (oldCuenta) {
          // Reverse the old movement
          if (mv.tipo === 'ingreso') oldCuenta.saldo -= mv.monto;
          else oldCuenta.saldo += mv.monto;
        }
      }
      if (mv) { mv.fecha = f; mv.tipo = t; mv.cat = catVal; mv.desc = d; mv.formaPago = fp; mv.cuentaId = ac; mv.monto = m; }
      // Apply new movement to new account
      if (cuenta) {
        if (t === 'ingreso') cuenta.saldo += m;
        else cuenta.saldo = Math.max(0, cuenta.saldo - m);
      }
    } else {
      S.movimientos.push({id: uid(), fecha: f, tipo: t, cat: catVal, desc: d, formaPago: fp, cuentaId: ac, monto: m});
      // Apply to account balance
      if (cuenta) {
        if (t === 'ingreso') cuenta.saldo += m;
        else cuenta.saldo = Math.max(0, cuenta.saldo - m);
      }
    }
    // Recalc cierre of affected month
    var movFecha = new Date(f + 'T12:00:00');
    recalcCierre(movFecha.getFullYear(), movFecha.getMonth());
    save(); closeM(); render(); toast(editId ? 'Actualizado OK' : 'Movimiento guardado OK');
  }

  function switchPayTab(tipo) {
    var t = document.getElementById('pay_total_sec');
    var p = document.getElementById('pay_parcial_sec');
    var bt = document.getElementById('tab_total');
    var bp = document.getElementById('tab_parcial');

      t.style.display = ''; p.style.display = 'none';
      bt.classList.add('on'); bp.classList.remove('on');

  function calcResto(saldoTotal) {
    var inp = document.getElementById('pay_monto');
    var info = document.getElementById('pay_resto_info');
    var sPaga = document.getElementById('pay_resto_paga');
    var sQueda = document.getElementById('pay_resto_queda');
    if (!inp || !info) return;
    var monto = parseFloat(inp.value) || 0;
    if (monto <= 0) { info.style.display = 'none'; return; }
    info.style.display = '';
    var paga = Math.min(monto, saldoTotal);
    var queda = Math.max(0, saldoTotal - paga);
    if (sPaga) sPaga.textContent = fmt(paga);
    if (sQueda) sQueda.textContent = fmt(queda);
  }

  function confirmarPagoTC(tcId, saldoTotal) {
    var tc = S.tarjetas.find(function(t){return t.id===tcId;});
    if (!tc) return;
    var tabTotal = document.getElementById('tab_total');
    var esPagoTotal = tabTotal && tabTotal.classList.contains('on');
    var cuentaId = document.getElementById('pay_cuenta').value;
    var fecha = document.getElementById('pay_fecha').value;
    var cuenta = S.cuentas.find(function(a){return a.id===cuentaId;});
    if (!cuenta) return;

    var montoPago, montoResto;
    if (esPagoTotal) {
      montoPago = saldoTotal;
      montoResto = 0;
    } else {
      montoPago = parseFloat(document.getElementById('pay_monto').value) || 0;
      if (!montoPago || montoPago <= 0) { showAlert('Ingresa el monto a pagar'); return; }
      montoPago = Math.min(montoPago, saldoTotal);
      montoResto = Math.max(0, saldoTotal - montoPago);
    }

    var saldoInsuficiente = (montoPago > cuenta.saldo && cuenta.moneda === 'ARS');

    // 1. Descontar de la cuenta
    if (cuenta.moneda === 'ARS') {
      cuenta.saldo = Math.max(0, cuenta.saldo - montoPago);
    } else {
      cuenta.saldo = Math.max(0, cuenta.saldo - montoPago / S.config.tipoCambio);
    }

    // 2. Registrar movimiento
    S.movimientos.push({
      id: uid(), fecha: fecha, tipo: 'gasto',
      cat: 'Tarjeta de credito',
      desc: 'Pago ' + tc.nombre + (esPagoTotal ? ' - Total' : ' - Parcial'),
      formaPago: 'Debito ' + cuenta.nombre.split(' ')[0],
      cuentaId: cuentaId, monto: montoPago
    });

    // 3. Registrar el pago en la tarjeta (para mostrar "Pagado" y la fecha)
    // Determine which billing cycle this payment covers
    // Find the cycle whose vencimiento is closest to (and after) the payment date
    var pagoFecha = new Date(fecha + 'T12:00:00');
    var cicloMes = tcM, cicloAnio = tcY;
    for (var di2 = -2; di2 <= 1; di2++) {
      var cm2 = tcM + di2, cy2 = tcY;
      if (cm2 < 0) { cm2 += 12; cy2--; } if (cm2 > 11) { cm2 -= 12; cy2++; }
      var venceTest = getVence(tc, cy2, cm2);
      if (venceTest && venceTest >= pagoFecha) { cicloMes = cm2; cicloAnio = cy2; break; }
    }
    tc.ultimoPago = {fecha: fecha, monto: montoPago, tipo: esPagoTotal ? 'total' : 'parcial', mes: cicloMes, anio: cicloAnio};

    // 4. Solo avanzar la cuota del MES ACTUAL en cada compra
    //    NO tocar cuotas de meses futuros  -  esas siguen pendientes
    var cuotasEsteMes = getCuotasMes(tcId, TY, TM);
    if (esPagoTotal) {
      // Advance each purchase by 1 cuota (mark current cycle cuota as paid)
      cuotasEsteMes.forEach(function(g) {
        var orig = S.gastosTC.find(function(x){return x.id===g.id;});
        if (orig && orig.pendientes > 0) {
          orig.pendientes = orig.pendientes - 1;
          orig.cuotaActual = orig.cuotaActual + 1;
        }
      });
    } else {
      // Pago parcial: create "Resumen anterior" for remainder, advance cuotas
      if (montoResto > 0) {
        // Push remainder to next month as resumen anterior
        var fechaNextCycle = new Date(fecha);
        fechaNextCycle.setDate(fechaNextCycle.getDate() + 1); // 1 day after payment = next cycle
        S.gastosTC.push({
          id: uid(), tcId: tcId,
          desc: 'Resumen anterior ' + tc.nombre,
          fechaCompra: fechaNextCycle.toISOString().slice(0,10),
          monto: montoResto, cuotasTotal: 1, cuotaActual: 1,
          pendientes: 1, montoCuota: montoResto, esResumenAnterior: true
        });
      }
      // Advance this month's cuotas
      cuotasEsteMes.forEach(function(g) {
        var orig = S.gastosTC.find(function(x){return x.id===g.id;});
        if (orig && orig.pendientes > 0) {
          orig.pendientes = orig.pendientes - 1;
          orig.cuotaActual = orig.cuotaActual + 1;
          // Record which offset was paid explicitly
          var ciclo = getCicloCompra(tc, orig.fechaCompra);
          var thisOffset = diffMeses(ciclo.y, ciclo.m, tcY, tcM);
          if (orig.pagadaHastaOffset === undefined || orig.pagadaHastaOffset === null || thisOffset > orig.pagadaHastaOffset) {
            orig.pagadaHastaOffset = thisOffset;
          }
        }
      });
    }

    save(); closeM(); render();

    var msg = saldoInsuficiente
      ? '! Saldo insuficiente. Pago registrado igual.'
      : (esPagoTotal
        ? 'Pago total ' + fmt(montoPago) + ' - ' + cuenta.nombre.split(' ')[0] + ' OK'
        : 'Pago parcial ' + fmt(montoPago) + ' . Resto ' + fmt(montoResto) + ' -> prox. mes');
    var t = document.getElementById('TOAST');
    if (t) { t.textContent = msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3500); }
  }

  function saveTarjeta(editId) {
    var nombre = document.getElementById('nt_nombre').value.trim();

    var venceDia = +document.getElementById('nt_vence').value;

    if (!nombre || !limite || !cierreDia || !venceDia) {

    if (editId) {

      if (tc) {
        tc.nombre = nombre;
        tc.limite = limite;
        tc.cierreDia = cierreDia;

        tc.color = color;
        tc.cierreRegla = 'dia_fijo'; // editing always sets fixed day rule
        tc.venceRegla = 'dia_fijo';

      S.tarjetas.push({
        id: uid(),
        nombre: nombre,
        color: color,
        cierreRegla: 'dia_fijo',
        cierreDia: cierreDia,
        venceDia: venceDia,
        limite: limite

    setTimeout(function(){t.classList.remove('show');},2200);

  function analizarTC() {
    var resultDiv = document.getElementById('tc_ia_result');
    if (!resultDiv) return;
    resultDiv.innerHTML =
      '<div class="alert a-b" style="margin-bottom:10px">' +
      '<div class="a-icon">\uD83E\uDDE0</div>' +
      '<div><div class="a-title">Analizando tus tarjetas...</div>' +
      '<div class="a-body">Procesando consumos, limites e historial. Un momento.</div></div></div>';

    // Build context for Claude
    var totalLim = S.tarjetas.reduce(function(s,t){return s+(t.limite||0);},0);
    var totalCons = S.tarjetas.reduce(function(s,t){return s+consumoTC(t.id);},0);
    var ing = S.config.sueldo + compFijosIngreso();
    var pctTC = ing > 0 ? (totalCons/ing*100).toFixed(1) : 0;
    var inflAcum = S.inflaciones.reduce(function(s,i){return s*(1+i.valor/100);},1);
    var inflMensual = (inflAct()*100).toFixed(1);

    var tarjetasInfo = S.tarjetas.map(function(t) {
      var cons = consumoTC(t.id);
      var lim = t.limite || 0;
      var pct = lim > 0 ? (cons/lim*100).toFixed(0) : 0;
      var cuotas = S.gastosTC.filter(function(g){return g.tcId===t.id&&g.pendientes>0;});
      return t.nombre + ': consumido $' + fmtK(cons) + ' de $' + fmtK(lim) + ' (' + pct + '%), ' + cuotas.length + ' cuotas activas';
    }).join('. ');

    var cuotasDetalle = S.gastosTC.filter(function(g){return g.pendientes>0;}).slice(0,8).map(function(g) {
      var tc = S.tarjetas.find(function(t){return t.id===g.tcId;});
      return (tc?tc.nombre:'TC') + ': ' + g.desc + ' $' + fmtK(g.montoCuota) + '/mes x' + g.pendientes + ' cuotas';
    }).join('. ');

    // Build spending by category and by day
    var gastosXCat = {};
    var gastosXDia = {};
    S.gastosTC.forEach(function(g) {
      var cat = g.cat || 'Sin categoria';
      gastosXCat[cat] = (gastosXCat[cat]||0) + g.monto;
      var dia = new Date(g.fechaCompra+'T12:00:00').getDate();
      gastosXDia[dia] = (gastosXDia[dia]||0) + g.montoCuota;
    });
    var topCats = Object.keys(gastosXCat).sort(function(a,b){return gastosXCat[b]-gastosXCat[a];}).slice(0,5).map(function(k){return k+': $'+fmtK(gastosXCat[k]);}).join(', ');
    var diasOrdenados = Object.keys(gastosXDia).sort(function(a,b){return gastosXDia[b]-gastosXDia[a];});
    var diaMasGastos = diasOrdenados.length > 0 ? 'dia '+diasOrdenados[0]+' ($'+fmtK(gastosXDia[diasOrdenados[0]])+')' : 'sin datos';
    var totalCuotas = S.gastosTC.reduce(function(s,g){return s+g.cuotasTotal;},0);
    var totalCuotasPend = S.gastosTC.reduce(function(s,g){return s+g.pendientes;},0);

    var prompt = 'Sos un asesor financiero personal especializado en el mercado argentino. ' +
      'Analiza en profundidad los patrones de consumo con tarjetas de credito y da 4 insights clave. ' +
      'DATOS FINANCIEROS: Ingreso mensual $' + fmtK(ing) + '. ' +
      'Tarjetas: ' + tarjetasInfo + '. ' +
      'Total consumido: $' + fmtK(totalCons) + ' (' + pctTC + '% del ingreso). ' +
      'PATRONES DE CONSUMO: Categorias principales: ' + (topCats||'sin datos') + '. ' +
      'Dia del mes con mas compras: ' + diaMasGastos + '. ' +
      'Cuotas totales activas: ' + totalCuotasPend + ' pendientes de ' + totalCuotas + ' totales. ' +
      'Cuotas detalle: ' + cuotasDetalle + '. ' +
      'CONTEXTO ARGENTINO: Inflacion mensual ' + inflMensual + '%. TC oficial $' + S.config.tipoCambio + '/USD. ' +
      'Responde SOLO con JSON: {"insights": [{"titulo": "...", "cuerpo": "...", "tipo": "alerta|consejo|oportunidad"}, ...]} ' +
      'Da exactamente 4 insights en espanol argentino con numeros reales. Analiza: 1) categoria con mas gasto, 2) patron de dias de compra, 3) impacto de cuotas vs inflacion, 4) recomendacion accionable concreta. Sin texto fuera del JSON.';

    fetch('https://odd-dream-46ba.colodegatti.workers.dev', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 800,
        messages: [{role: 'user', content: prompt}]
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var texto = '';
      if (data.content) data.content.forEach(function(b){ if(b.type==='text') texto += b.text; });
      // Extract JSON
      var match = texto.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('Respuesta inesperada');
      var parsed = JSON.parse(match[0]);
      var insights = parsed.insights || [];

      var html2 = '<div class="card c-p" style="margin-bottom:10px">';
      html2 += '<div class="sec">\uD83E\uDDE0 Analisis IA de tus tarjetas</div>';
      insights.forEach(function(ins) {
        var cls = ins.tipo === 'alerta' ? 'a-r' : ins.tipo === 'oportunidad' ? 'a-g' : 'a-b';
        var icon = ins.tipo === 'alerta' ? '\uD83D\uDEA8' : ins.tipo === 'oportunidad' ? '\uD83D\uDCA1' : '\uD83D\uDCCB';
        html2 += '<div class="alert ' + cls + '" style="margin-bottom:8px">';
        html2 += '<div class="a-icon">' + icon + '</div>';
        html2 += '<div><div class="a-title">' + ins.titulo + '</div>';
        html2 += '<div class="a-body">' + ins.cuerpo + '</div></div></div>';
      });
      html2 += '<div style="font-size:9px;color:var(--dim);text-align:right;margin-top:4px">Analisis generado por IA con tus datos reales</div>';
      html2 += '</div>';

      resultDiv.innerHTML = html2;
    })

        '<div class="alert a-r" style="margin-bottom:10px"><div class="a-icon">!</div>' +
        '<div><div class="a-title">No se pudo analizar</div>' +
        '<div class="a-body">' + (err.message||'Error de conexion') + '. Verifica tu internet e intentá de nuevo.</div>' +
        '</div></div>';
    });
  }

  function confirmarReabrirTC(tcId) {
    var tc = S.tarjetas.find(function(t){return t.id===tcId;});
    if (!tc || !tc.ultimoPago) { closeM(); return; }
    // Find and delete the payment movement
    var pagoFecha = tc.ultimoPago.fecha;
    var pagoMonto = tc.ultimoPago.monto;
    var movPago = S.movimientos.find(function(m) {
      return m.cat === 'Tarjeta de credito' &&
             m.fecha === pagoFecha &&
             Math.abs(m.monto - pagoMonto) < 1;
    });
    if (movPago) {
      // Restore account balance
      var cta = S.cuentas.find(function(a){return a.id===movPago.cuentaId;});
      if (cta) cta.saldo += movPago.monto;
      S.movimientos = S.movimientos.filter(function(m){return m.id!==movPago.id;});
    }
    // Reset ultimoPago
    tc.ultimoPago = null;
    save(); closeM(); render();
    var t = document.getElementById('TOAST');
    t.textContent = 'Factura reabierta. Pago eliminado de movimientos.';
    t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},3000);
    // Open cargar compra immediately
    APP.modalTC(tcId);
  }

  var _tcCalcOp = null;

  function calcTC(op) {
    var mInput = document.getElementById('tc_m');
    var cInput = document.getElementById('tc_calc_val');
    if (!mInput) return;
    var a = parseFloat(mInput.value) || 0;
    var b = parseFloat(cInput ? cInput.value : 0) || 0;
    if (op === '+') { _tcCalcOp = '+'; if(cInput) cInput.focus(); return; }
    if (op === '-') { _tcCalcOp = '-'; if(cInput) cInput.focus(); return; }
    if (op === 'x') { _tcCalcOp = 'x'; if(cInput) cInput.focus(); return; }
    if (op === '=') {
      var res = a;
      if (_tcCalcOp === '+') res = a + b;
      else if (_tcCalcOp === '-') res = a - b;
      else if (_tcCalcOp === 'x') res = a * b;
      mInput.value = Math.round(res);
      _tcCalcOp = null;
      if (cInput) cInput.value = '';
      APP.calcTCPreview();
    }
  }

  function calcTCPreview() {
    var mInput = document.getElementById('tc_m');
    var cInput = document.getElementById('tc_c');
    var prev = document.getElementById('tc_preview');
    if (!mInput || !prev) return;
    var monto = parseFloat(mInput.value) || 0;
    var cuotas = parseFloat(cInput ? cInput.value : 1) || 1;
    if (monto > 0) {
      prev.textContent = cuotas > 1 ? 'Cuota estimada: $' + Math.round(monto/cuotas).toLocaleString('es-AR') + '/mes x' + cuotas : '';
    } else {
      prev.textContent = '';
    }
  }

    var m = +document.getElementById('tc_m').value;
    var cuotas = +document.getElementById('tc_c').value || 1;
    if (!d || !m) return showAlert('Completa descripcion e importe');

    // Determine fechaCompra: if user selected a specific month of imputation,
    // override the date to fall within that month's cycle
    var fechaFinal = f;
    if (mesVal) {
      var parts = mesVal.split('-');
      var impY = parseInt(parts[0]);
      var impM = parseInt(parts[1]);
      var tc = S.tarjetas.find(function(t){return t.id===tcId;});
      if (tc) {
        // Get previous month's cierre - fechaCompra must be after it
        var prevM = impM === 0 ? 11 : impM - 1;
        var prevY = impM === 0 ? impY - 1 : impY;
        var cierrePrev = getCierre(tc, prevY, prevM);
        var cierreEste = getCierre(tc, impY, impM);
        if (cierrePrev && cierreEste) {
          // Set fechaCompra to 1 day after previous cierre to ensure it falls in the right cycle
          var d1 = new Date(cierrePrev.getTime() + 86400000);
          // But if user's real date already falls in the right cycle, use that
          var realDate = new Date(f + 'T12:00:00');
          if (realDate.getTime() > cierrePrev.getTime() && realDate.getTime() <= cierreEste.getTime()) {
            fechaFinal = f; // real date is already in the right cycle
          } else {
            fechaFinal = d1.toISOString().slice(0,10); // use day after prev cierre
          }
        }
      }
    }

    var catTC = document.getElementById('tc_cat') ? document.getElementById('tc_cat').value : 'Compras';
    S.gastosTC.push({
      id: uid(), tcId: tcId, desc: d, cat: catTC,
      fechaCompra: fechaFinal,
      mesImputacion: mesVal || null,
      monto: m, cuotasTotal: cuotas, cuotaActual: 1,
      pendientes: cuotas, montoCuota: Math.round((m / cuotas) * 100) / 100
    });
    save(); closeM(); render();
    toast('Compra cargada en ' + (mesVal ? MESES[parseInt(mesVal.split('-')[1])] + ' ' + mesVal.split('-')[0] : 'el mes actual') + ' OK');
  }

  function calcCuotaUVAPreview() {
    var uvas = +document.getElementById('np_uvas').value;
    var uvaVal = getValorUVA();
    var prev = document.getElementById('uva_preview');
    if (!prev) return;
    if (uvas > 0 && uvaVal > 0) {
      var cuotaARS = Math.round(uvas * uvaVal);
      prev.innerHTML = '<div style="font-size:13px;font-weight:700;color:var(--text)">' + uvas.toFixed(2) + ' UVAs x $' + uvaVal.toFixed(2) + ' = <span style="color:var(--green)">' + fmt(cuotaARS) + '</span></div>';
    } else if (uvas > 0) {
      prev.innerHTML = 'Sincroniza cotizaciones para ver el valor en pesos';
    } else {
      prev.innerHTML = 'Ingresa la cuota en UVAs para ver el valor en pesos';
    }
  }
  function savePrest() {
    var n = document.getElementById('np_n').value.trim(), t = document.getElementById('np_t').value;
    var a = +document.getElementById('np_a').value;
    var tot = +document.getElementById('np_tot').value, d = +document.getElementById('np_d').value;
    var fechaInicio = new Date(TY, TM - (a - 1), 1);
    var fiStr = fechaInicio.getFullYear() + '-' + String(fechaInicio.getMonth()+1).padStart(2,'0');

    if (t === 'uva') {
      var uvas = +document.getElementById('np_uvas').value;
      var capitalOrig = +document.getElementById('np_uvas_orig').value || 0;
      var tasaUVA = +document.getElementById('np_tasa_uva').value || 4.25;
      if (!n || !uvas) return showAlert('Completa nombre y cuota en UVAs');
      var uvaVal = getValorUVA() || 1;
      var cuotaARS = Math.round(uvas * uvaVal);
      // Sistema frances: calculate capital/interest for current cuota
      var tasaMensual = (tasaUVA / 100) / 12;
      var capitalUVAsCuota = 0;
      if (capitalOrig > 0 && tasaMensual > 0) {
        // Saldo remaining at cuota N in French system
        var saldoRestante = capitalOrig * (Math.pow(1+tasaMensual, tot) - Math.pow(1+tasaMensual, a-1)) / (Math.pow(1+tasaMensual, tot) - 1);
        var interesCuota = saldoRestante * tasaMensual;
        capitalUVAsCuota = uvas - interesCuota;
      }
      S.prestamos.push({
        id: uid(), nombre: n, tipo: 'uva', cuota: cuotaARS, cuotaN: a, cuotaTotal: tot,
        diaPago: d, fechaInicio: fiStr,
        cantidadUVAs: uvas, capitalOrigUVAs: capitalOrig, capitalUVAs: capitalUVAsCuota, tasaUVA: tasaUVA,
        tasaAnual: tasaUVA
      });
    } else {
      var cuota = +document.getElementById('np_c').value;
      var tasa = +document.getElementById('np_tasa').value || 0;
      var tasaTipo = (document.getElementById('np_tasa_tipo') || {}).value || 'fija';
      if (!n || !cuota) return showAlert('Completa nombre y cuota');
      S.prestamos.push({
        id: uid(), nombre: n, tipo: 'personal', cuota: cuota, cuotaN: a, cuotaTotal: tot,
        diaPago: d, tasaAnual: tasa, tasaTipo: tasaTipo, fechaInicio: fiStr
      });
    }
    save(); closeM(); render(); toast('Prestamo agregado OK');
  }

  function confirmarPagarPrest(id) {
    var p = S.prestamos.find(function(x){return x.id===id;});
    if (!p) return;
    var cuentaId = document.getElementById('pp_cuenta').value;
    var fecha = document.getElementById('pp_fecha').value;
    var cuenta = S.cuentas.find(function(a){return a.id===cuentaId;});
    if (!cuenta) return;

    // 1. Descontar de la cuenta
    var saldoInsuf = cuenta.saldo < p.cuota;
    cuenta.saldo = Math.max(0, cuenta.saldo - p.cuota);

    // 2. Registrar movimiento
    S.movimientos.push({
      id: uid(),
      fecha: fecha,
      tipo: 'gasto',
      cat: 'Prestamo',
      desc: 'Cuota ' + p.cuotaN + ' - ' + p.nombre,
      formaPago: 'Debito ' + cuenta.nombre.split(' ')[0],

  function modalSimUVA(id) {

    var cuotaTotal = p.cantidadUVAs || (p.cuota / uvaVal);
    var cuotaCap = p.capitalUVAs || cuotaTotal * 0.7;
    var cuotaInt = cuotaTotal - cuotaCap;
    var rest = p.cuotaTotal - p.cuotaN + 1;
    var tasaUVA = (p.tasaUVA || 4.25) / 100;

    var html = '<div class="mh"></div><div class="mt">Simulador UVA - ' + p.nombre + '</div>';

    // Current breakdown
    html += '<div style="background:var(--s3);border-radius:var(--rs);padding:12px;margin-bottom:12px">';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="lbl">Cuota total</span><span style="font-weight:700">' + cuotaTotal.toFixed(2) + ' UVAs = ' + fmt(Math.round(cuotaTotal * uvaVal)) + '</span></div>';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="lbl">Capital</span><span style="font-weight:700;color:var(--green)">' + cuotaCap.toFixed(2) + ' UVAs = ' + fmt(Math.round(cuotaCap * uvaVal)) + '</span></div>';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="lbl">Interes</span><span style="font-weight:700;color:var(--red)">' + cuotaInt.toFixed(2) + ' UVAs = ' + fmt(Math.round(cuotaInt * uvaVal)) + '</span></div>';
    html += '<div style="display:flex;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border)"><span class="lbl">Tasa UVA anual</span><span style="font-weight:700">' + (tasaUVA*100).toFixed(2) + '%</span></div>';
    html += '</div>';

    // Projection table
    html += '<div class="sec">Evolucion de la cuota</div>';
    [1, 3, 6, 12, 24].forEach(function(ms) {
      var cuotaFut = p.cuota * Math.pow(1 + infl, ms);

      html += '<div class="row"><span class="rl">En ' + ms + ' mes' + (ms > 1 ? 'es' : '') + '</span><span class="rv" style="color:var(--yellow)">' + fmt(cuotaFut) + ' <span style="font-size:9px;color:var(--red)">(+' + fmtK(aumento) + ')</span></span></div>';

    // Early payment simulation
    html += '<div class="sec" style="margin-top:12px">Simular adelanto de cuotas</div>';
    html += '<div class="fg"><label>Cuotas a adelantar</label><input class="inp" type="number" id="sim_adelanto" value="6" min="1" max="' + rest + '" oninput="APP.calcAdelantoUVA(\'' + p.id + '\')"/></div>';
    html += '<div id="adelanto_result"></div>';

    // Calculate default
    var cuotasAd = 6;
    var comisionPct = +((document.getElementById('sim_comision') || {}).value || 4);
    var capitalPuro = Math.round(cuotaCap * cuotasAd * uvaVal);
    var comision = Math.round(capitalPuro * comisionPct / 100);
    var costoAdelanto = capitalPuro + comision;
    var ahorroCuotas = 0;
    for (var q = 0; q < cuotasAd; q++) {
      ahorroCuotas += cuotaInt * uvaVal * Math.pow(1 + infl, rest - cuotasAd + q);
    }
    ahorroCuotas = Math.round(ahorroCuotas);
    var conviene = ahorroCuotas > costoAdelanto * 0.05;

    html += '<div id="adelanto_result_inner" style="background:var(--s3);border-radius:var(--rs);padding:12px;margin-bottom:10px">';

    html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="lbl">Comision (' + comisionPct + '%)</span><span style="font-weight:700;color:var(--red)">' + fmt(comision) + '</span></div>';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="lbl">Costo total del adelanto</span><span style="font-weight:700">' + fmt(costoAdelanto) + '</span></div>';

    html += '<div class="sec" style="margin-top:12px">Comision por cancelacion anticipada</div>';
    html += '<div class="fg"><label>Comision (%)</label><input class="inp" type="number" step="0.1" id="sim_comision" value="' + (p.comisionCancelacion || 4) + '" oninput="APP.calcAdelantoUVA(\'' + p.id + '\')"/><div style="font-size:9px;color:var(--dim);margin-top:2px">Banco Nacion cobra 4%. Pone 0 si no hay comision.</div></div>';

    html += '<button class="btn btn-s btn-w" data-action="closeModal" style="margin-top:8px">Cerrar</button>';

  function calcAdelantoUVA(id) {
    var p = S.prestamos.find(function(x) { return x.id === id; }); if (!p) return;
    var cuotasAd = +document.getElementById('sim_adelanto').value || 1;
    var uvaVal = getValorUVA() || 1;
    var infl = inflAct();
    var cuotaCap = p.capitalUVAs || (p.cantidadUVAs ? p.cantidadUVAs * 0.7 : p.cuota / uvaVal * 0.7);
    var cuotaInt = (p.cantidadUVAs || p.cuota / uvaVal) - cuotaCap;
    var rest = p.cuotaTotal - p.cuotaN + 1;

    var comisionPct = +((document.getElementById('sim_comision') || {}).value || 4);
    var capitalPuro = Math.round(cuotaCap * cuotasAd * uvaVal);
    var comision = Math.round(capitalPuro * comisionPct / 100);
    var costoAdelanto = capitalPuro + comision;
    var ahorroCuotas = 0;
    for (var q = 0; q < cuotasAd; q++) {
      ahorroCuotas += cuotaInt * uvaVal * Math.pow(1 + infl, rest - cuotasAd + q);
    }
    ahorroCuotas = Math.round(ahorroCuotas);
    var conviene = ahorroCuotas > costoAdelanto * 0.05;

    var res = document.getElementById('adelanto_result_inner');
    if (res) {
      res.innerHTML = '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="lbl">Costo del adelanto</span><span style="font-weight:700">' + fmt(costoAdelanto) + '</span></div>' +
        '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span class="lbl">Ahorro en intereses</span><span style="font-weight:700;color:var(--green)">' + fmt(ahorroCuotas) + '</span></div>' +
        '<div style="display:flex;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border)"><span style="font-weight:700">Resultado</span><span style="font-weight:700;color:' + (conviene ? 'var(--green)' : 'var(--red)') + '">' + (conviene ? 'Conviene adelantar' : 'No conviene ahora') + '</span></div>';
    }
  }

  function calcSim() {
    var cap = +document.getElementById('sn_cap').value, tasa = +document.getElementById('sn_tasa').value / 100 / 12, n = +document.getElementById('sn_n').value;
    if (!cap || !n) return;
    var cuota = tasa > 0 ? cap * tasa * Math.pow(1 + tasa, n) / (Math.pow(1 + tasa, n) - 1) : cap / n;
    var totPagar = cuota * n, ing = ingMes(TY, TM);
    var nuevoPct = (totalPrest() + cuota) / Math.max(ing, 1) * 100;
    document.getElementById('SIM_RES').innerHTML = '<div style="font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px">' + fmt(cuota) + '/mes</div>' +
      '<div style="font-size:10px;color:var(--dim)">Total: ' + fmt(totPagar) + ' . Interés: ' + fmtK(totPagar - cap) + '</div>' +
      '<div style="font-size:11px;margin-top:8px;color:' + (nuevoPct > 40 ? 'var(--red)' : nuevoPct > 30 ? 'var(--yellow)' : 'var(--green)') + '">Con este préstamo: ' + nuevoPct.toFixed(1) + '% de ingresos en deuda ' + (nuevoPct > 40 ? '\uD83D\uDEA8 MUY ALTO' : nuevoPct > 30 ? '! Cuidado' : 'OK OK') + '</div>';
  }

      html += '<span style="color:var(--dim)">' + (exp?'v':'>') + '</span></div>';
      if (exp) {
        html += '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">';
        html += '<table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr>' +
          ['Mes','Ingr.','Comp.','Libre'].map(function(h2){return '<th style="padding:4px 2px;text-align:left;color:var(--dim);font-size:9px;border-bottom:1px solid var(--border)">' + h2 + '</th>';}).join('') +
          '</tr></thead><tbody>';
        MC.forEach(function(mes,mi) {
          var mf=Math.pow(1+inflAct(),(y-TY)*12+mi);
          var mi2=ingMes(TY,TM)*mf, mc2=(totalPrest()+compFijosGasto()+combEst())*mf, lib=mi2-mc2;
          var cur=y===TY&&mi===TM;
          html += '<tr style="opacity:' + (y<TY||(y===TY&&mi<TM)?0.4:1) + '"><td style="padding:3px 2px;color:' + (cur?'var(--green)':'var(--text)') + ';font-weight:' + (cur?700:400) + '">' + mes + (cur?' *':'') + '</td>';
          html += '<td style="padding:3px 2px;font-family:monospace;color:var(--green)">' + fmtK(mi2) + '</td>';
          html += '<td style="padding:3px 2px;font-family:monospace;color:var(--red)">' + fmtK(mc2) + '</td>';
          html += '<td style="padding:3px 2px;font-family:monospace;color:' + (lib>=0?'var(--green)':'var(--red)') + '"><b>' + fmtK(lib) + '</b></td></tr>';
        });
        html += '</tbody></table></div>';
      }
      html += '</div>';
    });
    return html;
  }

  function renderScore() {

    var color = sc.total >= 81 ? 'var(--green)' : sc.total >= 61 ? 'var(--teal)' : sc.total >= 41 ? 'var(--yellow)' : 'var(--red)';
    var circ = 2 * Math.PI * 38;
    var dash = (sc.total / 100) * circ;

    var html = '<div class="card"><div class="sec">Score Financiero Personal</div>';
    html += '<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px">';

    html += '<circle cx="50" cy="50" r="38" stroke="var(--s4)" stroke-width="9" fill="none"/>';
    html += '<circle cx="50" cy="50" r="38" stroke="' + color + '" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="' + dash.toFixed(1) + ' ' + (circ-dash).toFixed(1) + '"/>';
    html += '</svg>';
    html += '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">';
    html += '<div style="font-size:26px;font-weight:900;font-family:monospace;color:' + color + ';line-height:1">' + sc.total + '</div>';
    html += '<div style="font-size:8px;color:var(--dim);font-weight:600">/ 100</div>';
    html += '</div></div>';
    html += '<div style="flex:1">';
    html += '<div style="font-size:14px;font-weight:800;color:' + color + ';margin-bottom:4px">' + sc.etiqueta.split(' - ')[0] + '</div>';
    html += '<div style="font-size:10px;color:var(--dim);line-height:1.5">' + sc.etiqueta.split(' - ')[1] + '</div>';
    html += '</div></div>';

    // 4 components
    var comps = [
      {name:'Deuda / Ingreso', pts:sc.ptsDeuda, max:35, color:'var(--blue)', detail: sc.ratioDeuda + '% (ideal < 30%)'},
      {name:'Liquidez', pts:sc.ptsLiquidez, max:25, color:'var(--teal)', detail: sc.mesesLiquidez + ' meses cubiertos (ideal 3+)'},
      {name:'Tasa de ahorro', pts:sc.ptsAhorro, max:25, color:'var(--green)', detail: sc.tasaAhorro + '% del ingreso (ideal 20%+)'},
      {name:'Diversificacion', pts:sc.ptsDiversif, max:15, color:'var(--purple)', detail: sc.pctARS + '% en ARS (ideal < 60%)'},
    ];
    comps.forEach(function(comp) {
      var pct = comp.max > 0 ? comp.pts/comp.max*100 : 0;
      html += '<div style="margin-bottom:10px">';
      html += '<div style="display:flex;justify-content:space-between;margin-bottom:3px">';
      html += '<span style="font-size:11px;font-weight:600">' + comp.name + '</span>';
      html += '<span style="font-size:11px;font-family:monospace;font-weight:700;color:' + comp.color + '">' + comp.pts + '/' + comp.max + ' pts</span>';
      html += '</div>';
      html += '<div class="pb-wrap"><div class="pb" style="width:' + pct.toFixed(0) + '%;background:' + comp.color + '"></div></div>';
      html += '<div style="font-size:9px;color:var(--dim);margin-top:2px">' + comp.detail + '</div>';
      html += '</div>';
    });
    html += '</div>';

    // TIR de CEDEARs
    if (S.cedears.length) {
      html += '<div class="card c-p"><div class="sec">TIR de CEDEARs vs Inflacion</div>';
      var inflTotal = (S.inflaciones.reduce(function(s,i){return s*(1+i.valor/100);},1)-1)*100;
      html += '<div class="alert a-b" style="margin-bottom:10px"><div class="a-icon">i</div><div><div class="a-title">Inflacion acumulada del periodo: +' + inflTotal.toFixed(1) + '%</div><div class="a-body">Si tu rendimiento supera este numero, le ganaste a la inflacion en terminos reales.</div></div></div>';
      S.cedears.forEach(function(ced) {
        var tir = calcTIR(ced);
        var colorTIR = parseFloat(tir.tirReal) >= 0 ? 'var(--green)' : 'var(--red)';
        html += '<div class="card" style="margin-bottom:8px;border-left:3px solid ' + (ced.color||'var(--purple)') + '">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
        html += '<div><div style="font-size:14px;font-weight:900;font-family:monospace;color:' + (ced.color||'var(--purple)') + '">' + ced.ticker + '</div>';
        html += '<div style="font-size:9px;color:var(--dim)">' + ced.nombre + '</div></div>';
        html += '<div style="text-align:right"><div style="font-size:16px;font-weight:800;font-family:monospace;color:' + colorTIR + '">' + (parseFloat(tir.tirReal)>=0?'+':'') + tir.tirReal + '%</div>';
        html += '<div style="font-size:9px;color:var(--dim)">TIR real anual</div></div>';
        html += '</div>';
        html += '<div class="g3">';
        html += '<div class="mc" style="text-align:center"><div class="lbl" style="margin-bottom:2px">TIR nominal</div><div style="font-size:12px;font-weight:700;color:var(--blue)">+' + tir.tirNominal + '%</div></div>';
        html += '<div class="mc" style="text-align:center"><div class="lbl" style="margin-bottom:2px">vs Inflacion</div><div style="font-size:12px;font-weight:700;color:' + colorTIR + '">' + (parseFloat(tir.tirReal)>=0?'+':'') + tir.tirReal + '%</div></div>';
        html += '<div class="mc" style="text-align:center"><div class="lbl" style="margin-bottom:2px">vs USD</div><div style="font-size:12px;font-weight:700;color:var(--teal)">' + (parseFloat(tir.vsUSD)>=0?'+':'') + tir.vsUSD + '%</div></div>';

        html += '</div>';
      });
      html += '</div>';
    }
    return html;
  }

  function renderDeudas() {

    if (!sim0) {
      html += '<div style="color:var(--dim);text-align:center;padding:16px">Sin prestamos activos para simular.</div>';

  function renderSimDeudasResult(extra) {
    var sim = simDeudas(extra);
    if (!sim) return '<div style="color:var(--dim);text-align:center;padding:12px">Sin prestamos activos.</div>';

    var html = '';
    // Comparison table
    html += '<div class="g3" style="margin-bottom:10px">';
    var opts = [
      {label:'Sin extra', data:sim.base, color:'var(--dim)'},
      {label:'Avalanche', data:sim.avalanche, color:'var(--blue)'},
      {label:'Snowball', data:sim.snowball, color:'var(--green)'},
    ];
    opts.forEach(function(o) {
      html += '<div class="mc" style="text-align:center">';
      html += '<div class="lbl" style="margin-bottom:3px">' + o.label + '</div>';
      html += '<div style="font-size:13px;font-weight:800;color:' + o.color + '">' + o.data.meses + ' meses</div>';
      html += '<div style="font-size:9px;color:var(--dim)">int. ' + fmtK(o.data.totalIntereses) + '</div>';
      html += '</div>';
    });
    html += '</div>';

    // Best strategy recommendation
    var mejor = sim.avalanche.meses <= sim.snowball.meses ? 'Avalanche' : 'Snowball';
    var ahorro = sim.base.meses - Math.min(sim.avalanche.meses, sim.snowball.meses);
    if (extra > 0 && ahorro > 0) {
      html += '<div class="alert a-g" style="margin-bottom:10px"><div class="a-icon">OK</div><div>';
      html += '<div class="a-title">Estrategia recomendada: ' + mejor + '</div>';
      html += '<div class="a-body">Con $' + fmtK(extra) + ' extra/mes cancelas ' + ahorro + ' meses antes y ahorras intereses.</div>';
      html += '</div></div>';
    }

    // UVA prepayment vs invest
    var uva = S.prestamos.find(function(p){return p.tipo==='uva';});
    if (uva) {
      var proxCuota = uva.cuota * (1 + inflAct());
      var inflAnual = inflAct() * 12 * 100;
      html += '<div style="background:var(--purple-glow);border:1px solid rgba(139,92,246,.25);border-radius:var(--rs);padding:10px;margin-top:8px">';
      html += '<div style="font-size:10px;font-weight:700;color:var(--purple);margin-bottom:6px">Adelantar cuota UVA vs Invertir</div>';
      html += '<div class="row"><span class="rl">Costo actual cuota UVA</span><span class="rv" style="color:var(--purple)">' + fmt(uva.cuota) + '</span></div>';
      html += '<div class="row"><span class="rl">Cuota estimada proximo mes</span><span class="rv" style="color:var(--yellow)">' + fmt(proxCuota) + '</span></div>';
      html += '<div class="row"><span class="rl">Costo de no adelantar (1 mes)</span><span class="rv" style="color:var(--red)">+' + fmt(proxCuota - uva.cuota) + '</span></div>';
      html += '<div class="alert a-b" style="margin-top:8px;margin-bottom:0"><div class="a-icon">i</div><div><div class="a-body">Adelantar conviene si tu inversion rinde menos del ' + inflAnual.toFixed(0) + '% anual (inflacion estimada). Si rinde mas, es mejor invertir.</div></div></div>';
      html += '</div>';
    }

    // Proyeccion sin deuda
    html += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">';
    html += '<div style="font-size:10px;color:var(--dim);margin-bottom:5px">Si usas la cuota de prestamos para invertir cuando termines de pagar:</div>';
    var cuotaTotal = sim.cuotaTotal;
    var mesesLibre = sim.avalanche.meses;
    var capitalExtra = cuotaTotal * mesesLibre;
    html += '<div class="row"><span class="rl">Cuota total mensual liberada</span><span class="rv" style="color:var(--green)">' + fmt(cuotaTotal) + '</span></div>';
    html += '<div class="row" style="border:none"><span class="rl">Capital acumulado en ' + mesesLibre + ' meses</span><span class="rv" style="color:var(--green)">' + fmtK(capitalExtra) + '</span></div>';
    html += '</div>';

    return html;
  }

  function actualizarSimDeudas() {

  function renderMetas() {
    var html = '<div class="card"><div class="sec">Metas de ahorro</div>';

      html += '<div style="color:var(--dim);text-align:center;padding:16px;font-size:12px">No tenés metas definidas.<br>Creá una para empezar a ahorrar con un objetivo.</div>';

      S.metas.forEach(function(m) {
        var pct = Math.min(100, m.acumulado / m.objetivo * 100);

        if (diasRest !== null) html += '<div style="font-size:9px;color:var(--dim);margin-top:2px">' + (diasRest > 0 ? diasRest + ' dias restantes' : 'Vencida') + '</div>';
        html += '</div>';
        html += '<div style="display:flex;gap:6px;align-items:center">';
        html += '<button class="edit-btn" data-action="editMeta" data-id="' + m.id + '">Ed</button>';
        html += '<button class="del-btn" data-del="meta" data-id="' + m.id + '">x</button>';
        html += '</div></div>';
        html += '<div style="background:var(--s3);border-radius:20px;height:8px;margin-bottom:8px;overflow:hidden">';
        html += '<div style="background:' + color + ';height:100%;width:' + pct.toFixed(0) + '%;border-radius:20px;transition:width .4s"></div>';
        html += '</div>';
        html += '<div style="display:flex;justify-content:space-between">';
        html += '<div style="font-size:10px"><span style="color:var(--dim)">Acumulado </span><span style="color:' + color + ';font-weight:700;font-family:monospace">' + fmtK(m.acumulado) + '</span></div>';
        html += '<div style="font-size:10px"><span style="color:var(--dim)">Objetivo </span><span style="font-weight:700;font-family:monospace">' + fmtK(m.objetivo) + '</span></div>';
        html += '</div>';
        if (pct < 100) {
          html += '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:space-between">';
          html += '<span style="font-size:10px;color:var(--dim)">Falta ahorrar</span>';
          html += '<span style="font-size:12px;font-weight:700;font-family:monospace;color:var(--yellow)">' + fmtK(resta) + '</span>';
          html += '</div>';
        } else {
          html += '<div class="alert a-g" style="margin-top:8px;margin-bottom:0"><div class="a-icon">OK</div><div><div class="a-title">Meta alcanzada!</div></div></div>';
        }
        html += '</div>';
      });
    }
    html += '<button class="btn btn-p btn-sm btn-w" style="margin-top:8px" data-action="modalAddMeta">+ Nueva meta</button>';
    html += '</div>';
    return html;
  }

  function exportarBackup() {
    var data = JSON.stringify(S, null, 2);
    var blob = new Blob([data], {type: 'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'FinAR-Pro-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Backup exportado OK');
  }

  function importarBackup(input) {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!data.movimientos || !data.cuentas) throw new Error('Archivo invalido');
        // Confirm
        if (!confirm('Se reemplazaran TODOS tus datos actuales con el backup. Continuar?')) return;
        S = data;
        if (!S.metas) S.metas = [];
        if (!S.presupuestos) S.presupuestos = [];
        save();
        APP.render();
        toast('Backup restaurado OK');
      } catch(e) {
        showAlert('Error al importar: ' + e.message);
      }
    };
    reader.readAsText(file);
    input.value = '';
  }

  // Config modals
  function buscarInflIA() {
    var resultDiv = document.getElementById('infl_ia_result');
    if (!resultDiv) return;
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = '<div class="alert a-b" style="margin-top:8px"><div class="a-icon">\uD83E\uDD16</div><div><div class="a-title">Buscando inflacion...</div><div class="a-body">Consultando datos del INDEC via IA. Un momento.</div></div></div>';

    var mesActual = MC[TM] + ' ' + TY;
    var mesAnterior = TM > 0 ? MC[TM-1] + ' ' + TY : MC[11] + ' ' + (TY-1);

    fetch('https://odd-dream-46ba.colodegatti.workers.dev', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        apiKey: 'sk-ant-api03-placeholder',
        model: 'claude-sonnet-4-5-20241022',
        max_tokens: 1024,
        tools: [{type: 'web_search_20250305', name: 'web_search'}],
        messages: [{
          role: 'user',
          content: 'Busca en google el dato oficial de inflacion mensual de Argentina del INDEC para ' + mesAnterior + '. Cuando lo encuentres, responde SOLO con este JSON (sin texto adicional): {"mes": N, "anio": YYYY, "valor": X.X, "fuente": "INDEC"} donde mes es el numero de mes (1-12), anio es el anio, y valor es el porcentaje mensual como numero (ejemplo: 3.7 para 3.7%). SOLO el JSON, nada mas.'
        }]
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      console.log('InflIA response:', JSON.stringify(data).slice(0, 500));
      if (data.error) throw new Error(data.error.message || 'API error');
      var texto = '';
      var searchText = '';
      if (data.content) {
        data.content.forEach(function(block){
          if (block.type === 'text') texto += block.text;
          // Also collect web search results as fallback
          if (block.type === 'web_search_tool_result' && block.content) {
            block.content.forEach(function(r){ if (r.type==='text') searchText += r.text + ' '; });
          }
        });
      }
      // If no text block, the model only did search but didn't respond  -  do a second call
      if (!texto.trim()) {
        // Try to extract % from search results directly
        var pctMatch = searchText.match(/(\d+[,.]\d+)\s*%/);
        if (pctMatch) {
          var valStr = pctMatch[1].replace(',','.');
          texto = '{"mes":' + (TM > 0 ? TM : 12) + ',"anio":' + (TM > 0 ? TY : TY-1) + ',"valor":' + valStr + ',"fuente":"INDEC"}';
        } else {
          throw new Error('El modelo busco pero no encontro el dato. La inflacion de ' + mesAnterior + ' puede no estar publicada aun. Cargala manualmente.');
        }
      }
      var match = texto.match(/\{[\s\S]*?"valor"[\s\S]*?\}/);
      if (!match) match = texto.match(/\{[^{}]+\}/);
      if (!match) throw new Error('No se encontro JSON. Respuesta: ' + texto.slice(0, 150));
      var dato;
      try { dato = JSON.parse(match[0]); } catch(e) { throw new Error('JSON invalido: ' + match[0]); }
      if (!dato.valor || !dato.mes || !dato.anio) throw new Error('Dato incompleto: ' + JSON.stringify(dato));

      // Show confirmation UI
      resultDiv.innerHTML =
        '<div class="alert a-g" style="margin-top:8px">' +
          '<div class="a-icon">OK</div>' +
          '<div style="flex:1">' +
            '<div class="a-title">Dato encontrado</div>' +
            '<div class="a-body">Inflacion ' + MC[dato.mes-1] + ' ' + dato.anio + ': <b style="color:var(--yellow);font-size:14px">+' + dato.valor + '%</b><br>Fuente: ' + (dato.fuente||'INDEC') + '</div>' +
            '<div style="display:flex;gap:7px;margin-top:8px">' +
              '<button class="btn btn-p btn-sm" style="flex:1" data-action="confirmarInflIA" data-mes="' + (dato.mes-1) + '" data-anio="' + dato.anio + '" data-valor="' + dato.valor + '">Cargar este dato</button>' +
              '<button class="btn btn-s btn-sm" data-action="cancelarInflIA">Cancelar</button>' +
            '</div>' +
          '</div>' +
        '</div>';
    })
    .catch(function(err){
      resultDiv.innerHTML =
        '<div class="alert a-r" style="margin-top:8px">' +
          '<div class="a-icon">!</div>' +
          '<div>' +
            '<div class="a-title">No se pudo obtener el dato</div>' +
            '<div class="a-body">' + (err.message||'Error de conexion') + '. Verifica que tenes internet y volvé a intentar, o cargalo manual.</div>' +
          '</div>' +
        '</div>';
    });
  }

  function exportCSV() {
    var rows = [['Fecha', 'Tipo', 'Categoria', 'Descripcion', 'Forma de pago', 'Cuenta', 'Monto']];
    S.movimientos.slice().sort(function(a, b) { return a.fecha.localeCompare(b.fecha); }).forEach(function(m) {
      var acct = S.cuentas.find(function(a) { return a.id === m.cuentaId; });
      rows.push([m.fecha, m.tipo, m.cat, m.desc, m.formaPago, acct ? acct.nombre : '', m.monto]);
    });
    var csv = rows.map(function(r) { return r.map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(','); }).join('\n');
    
    // Show CSV as printable overlay (same approach as PDF)
    var htmlCSV = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>FinAR Pro CSV</title>';
    htmlCSV += '<style>body{font-family:monospace;font-size:11px;padding:10px}table{border-collapse:collapse;width:100%}th,td{border:1px solid #ddd;padding:4px 6px;text-align:left}th{background:#0EA5E9;color:#fff;font-size:10px}</style></head><body>';
    htmlCSV += '<h3>FinAR Pro - Movimientos</h3>';
    htmlCSV += '<table><tr>' + rows[0].map(function(h){return '<th>'+h+'</th>';}).join('') + '</tr>';
    for (var ri = 1; ri < rows.length; ri++) {
      htmlCSV += '<tr>' + rows[ri].map(function(v,ci){
        return '<td' + (ci===6?' style="text-align:right"':'') + '>' + (ci===6?fmt(v):v) + '</td>';
      }).join('') + '</tr>';
    }
    htmlCSV += '</table></body></html>';
    
    var overlay = document.createElement('div');
    overlay.id = 'PDF_OVERLAY';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#fff;overflow:auto;padding:0';
    var actionBar = '<div style="position:sticky;top:0;background:#0A1628;padding:10px 16px;display:flex;gap:8px;z-index:1">';
    actionBar += '<button onclick="closePDFOverlay()" style="flex:1;padding:10px;background:#263045;border:1px solid #3a4460;border-radius:8px;color:#fff;font-weight:700;font-size:13px;cursor:pointer">Volver</button>';

    actionBar += '</div>';

  // CEDEAR ratios (quantity of ADR shares per CEDEAR)
  var CEDEAR_RATIOS = {
    'AAPL': 10, 'KO': 5, 'AXP': 4, 'SPY': 15,
    'MSFT': 10, 'GOOGL': 16, 'AMZN': 36, 'TSLA': 15,
    'META': 6, 'NVDA': 10, 'JPM': 4, 'V': 8,
    'DIS': 4, 'MELI': 60, 'BA': 4, 'WMT': 5,

  function sincronizarCedears() {
    if (!S.cedears || S.cedears.length === 0) { toast('No hay CEDEARs cargados'); return; }
    if (!isOnline) { toast('Sin conexion'); return; }
    var tickers = S.cedears.map(function(ced){ return ced.ticker; });
    var tc = S.config.tipoCambio || 1200;
    var done = 0;
    var total = tickers.length;
    var updated = 0;
    var errors = 0;
    toast('Actualizando ' + total + ' CEDEAR' + (total>1?'s':'') + '...');

    tickers.forEach(function(ticker) {
      // Use Cloudflare Worker - no CORS issues in Android WebView
      var workerUrl = 'https://odd-dream-46ba.colodegatti.workers.dev/yahoo/' + ticker;
      fetch(workerUrl, {
        method: 'GET',
        headers: {'Accept': 'application/json'}
      })
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        if (data.error) throw new Error(data.error);
        var price = data.price;
        if (price > 0) {
          var ced = S.cedears.find(function(x){ return x.ticker === ticker; });
          if (ced) {
            var ratio = CEDEAR_RATIOS[ticker] || 10;
            var precioAnterior = ced.precioActual || 0;
            ced.precioActual = Math.round(price * tc / ratio);
            ced.precioUSD = price;
            ced.ultimaActualizacion = new Date().toISOString().slice(0,10);
            if (precioAnterior > 0 && ced.precioActual !== precioAnterior) updated++;
            else if (precioAnterior === 0) updated++;
          }
        }
        done++;
        if (done >= total) onAllDone();
      })
      .catch(function(e) {
        console.log('CEDEAR error ' + ticker + ':', e.message);
        errors++;
        done++;
        if (done >= total) onAllDone();
      });
    });

    function onAllDone() {
      save(); APP.render();
      if (errors === total) {
        toast('No se pudo conectar. Verifica internet.');
      } else if (updated > 0) {
        toast(updated + ' CEDEAR' + (updated>1?'s':'') + ' actualizado' + (updated>1?'s':'') + (errors>0?' ('+errors+' error)':''));
      } else {
        toast('Precios al dia, sin cambios');
      }
    }
  }

  function sincronizarDatos() {
    var btn = document.getElementById('btn_sync');
    var res = document.getElementById('sync_result');
    if (btn) { btn.textContent = 'Sincronizando...'; btn.disabled = true; }
    if (res) res.innerHTML = '<div class="alert a-b" style="margin-bottom:8px"><div class="a-icon">\uD83D\uDD04</div><div><div class="a-title">Buscando cotizaciones...</div><div class="a-body">Consultando BCRA y Dolar API</div></div></div>';

    var dolarOk = false, uvaOk = false;
    var dolarVal = 0, uvaVal = 0, uvaFecha = '';

    function checkDone() {
      if (!dolarOk || !uvaOk) return;
      // Both done - save and update UI
      if (dolarVal > 0) S.config.tipoCambio = dolarVal;
      if (uvaVal > 0) {
        S.config.uvaValor = uvaVal;
        // Auto-update inflation if we have UVA history
        var mesActual = TM, anioActual = TY;
        // Also save UVA as inflacion if not already for this month
        // (rough estimate: UVA monthly change = inflation)
      }
      S.config.lastSync = new Date().toISOString();
      // Auto-sync CEDEAR prices if we have tickers
      if (S.cedears && S.cedears.length > 0 && S.config.tipoCambio > 0) {
        sincronizarCedears();
      } else {
        save();
      }
      if (btn) { btn.textContent = 'Sincronizar ahora'; btn.disabled = false; }
      if (res) {
        res.innerHTML =
          '<div class="alert a-g" style="margin-bottom:8px"><div class="a-icon">OK</div><div>' +
          '<div class="a-title">Sincronizacion exitosa</div>' +
          '<div class="a-body">' +
            'Dolar oficial: <b>$' + dolarVal.toFixed(0) + '</b> . ' +
            'UVA: <b>$' + uvaVal.toFixed(2) + '</b> (' + uvaFecha + ')<br>' +
            (S.cedears.length > 0 ? 'Precios CEDEAR: actualizando...<br>' : '') +
            (S.prestamos.find(function(p){return p.tipo==='uva'&&p.cantidadUVAs;}) ?
              'Cuota UVA actualizada: <b>$' + Math.round(S.prestamos.find(function(p){return p.tipo==='uva'&&p.cantidadUVAs;}).cantidadUVAs * uvaVal).toLocaleString('es-AR') + '</b>' : '') +
          '</div></div></div>';
      }
      APP.render();
      var t = document.getElementById('TOAST');
      t.textContent = 'Dolar $' + dolarVal.toFixed(0) + ' . UVA $' + uvaVal.toFixed(2);
      t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},4000);
    }

    function onError(what, err) {
      if (btn) { btn.textContent = 'Sincronizar ahora'; btn.disabled = false; }
      if (res) res.innerHTML =
        '<div class="alert a-r" style="margin-bottom:8px"><div class="a-icon">!</div><div>' +
        '<div class="a-title">Error al sincronizar ' + what + '</div>' +
        '<div class="a-body">' + (err||'Sin conexion o API no disponible') + '. Podes actualizar manualmente abajo.</div>' +
        '</div></div>';
    }

    // 1. Fetch dolar oficial from dolarapi.com
    fetch('https://dolarapi.com/v1/dolares/oficial')
      .then(function(r){ return r.json(); })
      .then(function(d){
        dolarVal = d.venta || d.compra || 0;
        dolarOk = true;
        checkDone();
      })
      .catch(function(e){ dolarOk = true; onError('dolar', e.message); });

    // 2. Fetch UVA - try multiple sources with CORS support
    // Primary: dolarapi.com (has CORS headers, works from file://)
    // Fallback: endpoint alternativo
    // Fetch UVA using cascade of 3 sources
    function fetchUVA1() {
      // Source 1: argentinadatos.com - correct endpoint with CORS
      return fetch('https://api.argentinadatos.com/v1/finanzas/indices/uva')
        .then(function(r){ return r.json(); })
        .then(function(d){
          var arr = Array.isArray(d) ? d : [];
          if (arr.length > 0) {
            var last = arr[arr.length-1];
            uvaVal = parseFloat(last.valor);
            uvaFecha = last.fecha || 'reciente';
            return uvaVal > 0;
          }
          return false;
        });
    }
    function fetchUVA2() {
      // Source 2: CORS proxy wrapping BCRA (corsproxy.io)
      var hoy = new Date();
      var hace5 = new Date(hoy.getTime() - 5*86400000);
      var fDesde = hace5.toISOString().slice(0,10);
      var fHasta = hoy.toISOString().slice(0,10);
      var bcraUrl = 'https://api.bcra.gob.ar/estadisticas/v2.0/datosvariable/31/' + fDesde + '/' + fHasta;
      return fetch('https://corsproxy.io/?' + encodeURIComponent(bcraUrl))
        .then(function(r){ return r.json(); })
        .then(function(d){
          if (d.results && d.results.length > 0) {
            var last = d.results[d.results.length-1];
            uvaVal = parseFloat(last.valor);
            uvaFecha = last.fecha;
            return uvaVal > 0;
          }
          return false;
        });
    }
    function fetchUVA3() {
      // Source 3: bluelytics API (has UVA in some versions)
      return fetch('https://api.bluelytics.com.ar/v2/latest')
        .then(function(r){ return r.json(); })
        .then(function(d){
          // bluelytics doesn't have UVA, will return false
          return false;
        });
    }
    fetchUVA1()
      .catch(function(){ return false; })
      .then(function(ok){ return ok ? true : fetchUVA2().catch(function(){ return false; }); })
      .then(function(ok){
        uvaOk = true;
        if (!ok) {
          onError('UVA', 'Todas las fuentes fallaron por CORS. Ingresa el valor UVA manualmente en el campo de abajo.');
        } else {
          checkDone();
        }
      });
  }

// Custom confirm - replaces native confirm() which fails in Android WebView file://
var _pendingDel = null;
function showConfirmDel(type, id) {
  _pendingDel = {type: type, id: id};
  var msg = {mov:'?Eliminar este movimiento?', comp:'?Eliminar compromiso?',
    prest:'?Eliminar préstamo?', cedear:'?Eliminar CEDEAR?', tc:'?Eliminar cuota?',
    ev:'?Eliminar evento?', cuenta:'?Eliminar cuenta?', infl:'?Eliminar inflación?',
    cierre:'?Eliminar cierre de mes?', meta:'?Eliminar esta meta?', presup:'?Eliminar presupuesto?'}[type] || '?Eliminar?';
  var wrap = document.getElementById('CONFIRM_WRAP');
  document.getElementById('CONFIRM_MSG').textContent = msg;
  wrap.style.display = 'flex';
}
function confirmDelYes() {
  document.getElementById('CONFIRM_WRAP').style.display = 'none';
  if (!_pendingDel) return;
  var type = _pendingDel.type, id = _pendingDel.id;
  _pendingDel = null;
  if (type==='mov') {
    var mvDel = S.movimientos.find(function(x){return x.id===id;});
    if (mvDel && mvDel.cuentaId) {
      var cDel = S.cuentas.find(function(a){return a.id===mvDel.cuentaId;});
      if (cDel) {
        if (mvDel.tipo === 'ingreso') cDel.saldo = Math.max(0, cDel.saldo - mvDel.monto);
        else cDel.saldo += mvDel.monto;
      }
    }
    // If this movement was a TC payment, reverse completely
    if (mvDel && mvDel.cat === 'Tarjeta de credito') {
      S.tarjetas.forEach(function(tc) {
        if (tc.ultimoPago && tc.ultimoPago.fecha === mvDel.fecha &&
            Math.abs(tc.ultimoPago.monto - mvDel.monto) < 1) {
          var wasPartial = tc.ultimoPago.tipo === 'parcial';
          var pagoMes = tc.ultimoPago.mes;
          var pagoAnio = tc.ultimoPago.anio;
          tc.ultimoPago = null;
          // Revert cuota advance for this card's purchases in that cycle
          S.gastosTC.forEach(function(g) {
            if (g.tcId !== tc.id) return;
            var ciclo = getCicloCompra(tc, g.fechaCompra);
            var offset = diffMeses(ciclo.y, ciclo.m, pagoAnio, pagoMes);
            if (offset >= 0 && offset < g.cuotasTotal) {
              // This purchase had a cuota in the paid cycle
              if (g.pagadaHastaOffset !== undefined && g.pagadaHastaOffset !== null && g.pagadaHastaOffset >= offset) {
                g.pagadaHastaOffset = offset - 1;
                if (g.pagadaHastaOffset < 0) g.pagadaHastaOffset = null;
              }
              if (g.cuotaActual > 1) g.cuotaActual = g.cuotaActual - 1;
              g.pendientes = g.pendientes + 1;
            }
          });
          // If partial: remove "Resumen anterior" carryover from next cycle
          if (wasPartial) {
            S.gastosTC = S.gastosTC.filter(function(g) {
              if (g.tcId !== tc.id) return true;
              if (!g.esResumenAnterior) return true;
              // Remove resumen anterior created in the cycle AFTER the payment cycle
              var gFecha = new Date(g.fechaCompra + 'T12:00:00');
              var pagoFechaDate = new Date(mvDel.fecha + 'T12:00:00');
              var diffDays = (gFecha.getTime() - pagoFechaDate.getTime()) / (1000*60*60*24);
              return !(diffDays >= 0 && diffDays <= 3);
            });
          }
        }
      });
    }
    S.movimientos = S.movimientos.filter(function(x){return x.id!==id;});
    if (mvDel) {
      var delFecha = new Date(mvDel.fecha + 'T12:00:00');
      recalcCierre(delFecha.getFullYear(), delFecha.getMonth());
    }
  }
  else if (type==='comp') S.compromisos = S.compromisos.filter(function(x){return x.id!==id;});
  else if (type==='tarjeta') S.tarjetas = S.tarjetas.filter(function(x){return x.id!==id;});
  else if (type==='cierre') {
    var parts = id.split('-'); var cy = parseInt(parts[0]); var cm = parseInt(parts[1]);
    S.cierresMes = S.cierresMes.filter(function(x){return !(x.anio===cy&&x.mes===cm);});
  }
  else if (type==='prest') S.prestamos = S.prestamos.filter(function(x){return x.id!==id;});
  else if (type==='cedear') S.cedears = S.cedears.filter(function(x){return x.id!==id;});
  else if (type==='tc') { S.gastosTC = S.gastosTC.filter(function(x){return x.id!==id;}); }
  else if (type==='ev') S.eventos = S.eventos.filter(function(x){return x.id!==id;});
    else if (type==='meta') S.metas = S.metas.filter(function(x){return x.id!==id;});
    else if (type==='presup') S.presupuestos = S.presupuestos.filter(function(x){return x.id!==id;});
  else if (type==='cuenta') S.cuentas = S.cuentas.filter(function(x){return x.id!==id;});
  else if (type==='infl') S.inflaciones = S.inflaciones.filter(function(x){return x.id!==id;});
  save();
  APP.render();
  var t=document.getElementById('TOAST');
  t.textContent='Eliminado';t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}
function confirmDelNo() {
  _pendingDel = null;
  document.getElementById('CONFIRM_WRAP').style.display = 'none';
}
