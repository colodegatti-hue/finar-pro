<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0A0E1A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="FinAR Pro"/>
<title>FinAR Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* Dark theme (default) */
  --bg:#0A0E1A;--s1:#111827;--s2:#1A2235;--s3:#1F2A40;--s4:#263045;
  --border:#2A3650;--border2:#374260;
  --green:#00C896;--green2:#00A07A;--green-glow:rgba(0,200,150,.15);
  --yellow:#F5A623;--yellow2:#D4881A;--yellow-glow:rgba(245,166,35,.12);
  --red:#F04438;--red2:#C02828;--red-glow:rgba(240,68,56,.12);
  --blue:#3D8EF0;--blue-glow:rgba(61,142,240,.12);
  --purple:#8B5CF6;--purple-glow:rgba(139,92,246,.12);
  --teal:#14B8A6;--orange:#FB923C;
  --text:#EDF2FF;--dim:#7A8BA8;--dim2:#4A5A78;
  --r:14px;--rs:9px;
  /* Logo colors */
  --logo-g:#22C55E;--logo-teal:#0F766E;--logo-gold:#F59E0B;
}
.light-mode{
  --bg:#F1F5F9;--s1:#FFFFFF;--s2:#F8FAFC;--s3:#F1F5F9;--s4:#E2E8F0;
  --border:#CBD5E1;--border2:#94A3B8;
  --text:#0F172A;--dim:#475569;--dim2:#94A3B8;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:'Plus Jakarta Sans',sans-serif}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ═══════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════ */
#APP{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:relative;overflow:hidden}
#TOPBAR{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;z-index:30}
#CONTENT{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 12px 86px;scroll-behavior:smooth}
#NAVBAR{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--s1);border-top:1px solid var(--border);z-index:30;padding-bottom:env(safe-area-inset-bottom);display:grid;grid-template-columns:repeat(7,1fr)}
#MODAL_WRAP{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.6)}
#MODAL_WRAP.open{display:flex}
#TOAST{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--green);color:#fff;padding:9px 20px;border-radius:99px;font-size:12px;font-weight:700;z-index:100;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
#TOAST.show{transform:translateX(-50%) translateY(0)}
.fab{position:fixed;bottom:74px;right:calc(50% - 200px);width:46px;height:46px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:22px;cursor:pointer;z-index:25;box-shadow:0 4px 20px rgba(0,200,150,.4);display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s}
.fab:active{transform:scale(.88);box-shadow:0 2px 10px rgba(0,200,150,.3)}
@media(max-width:430px){.fab{right:12px}}

/* ═══════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════ */
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-icon{width:30px;height:30px}
.logo-text{font-size:16px;font-weight:800;line-height:1}
.logo-text span{color:var(--logo-g)}
.logo-text em{color:var(--dim);font-style:normal;font-weight:400;font-size:12px}
.topbar-right{display:flex;align-items:center;gap:6px}
.icon-btn{background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--dim);padding:5px 8px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.icon-btn:hover{border-color:var(--green);color:var(--green)}
.date-chip{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim);background:var(--s3);padding:3px 8px;border-radius:99px;border:1px solid var(--border)}

/* ═══════════════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════════════ */
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px;gap:3px;border:none;background:transparent;color:var(--dim);cursor:pointer;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;position:relative;transition:color .2s;font-family:inherit}
.nb svg{width:18px;height:18px;stroke-width:1.8;transition:filter .2s}
.nb.on{color:var(--green)}
.nb.on svg{filter:drop-shadow(0 0 5px var(--green))}
.nb-dot{position:absolute;top:6px;right:calc(50% - 13px);width:6px;height:6px;border-radius:50%;background:var(--red);border:1px solid var(--s1);display:none}
.nb-dot.show{display:block}

/* ═══════════════════════════════════════════════════
   CARDS & LAYOUT
═══════════════════════════════════════════════════ */
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.c-g::before{background:var(--green)}.c-r::before{background:var(--red)}
.c-y::before{background:var(--yellow)}.c-b::before{background:var(--blue)}
.c-p::before{background:var(--purple)}.c-t::before{background:var(--teal)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.mc{background:var(--s3);border:1px solid var(--border);border-radius:var(--rs);padding:10px}
.sec{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(42,54,80,.6)}
.row:last-child{border-bottom:none;padding-bottom:0}
.rl{font-size:11px;color:var(--dim)}.rv{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}

/* ═══════════════════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════════════════ */
.lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);margin-bottom:3px}
.big{font-size:28px;font-weight:800;line-height:1;font-family:'JetBrains Mono',monospace}
.med{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
.sm{font-size:12px;font-weight:600;font-family:'JetBrains Mono',monospace}
.page-title{font-size:17px;font-weight:800;margin-bottom:3px}
.page-sub{font-size:11px;color:var(--dim);margin-bottom:12px}

/* ═══════════════════════════════════════════════════
   PILLS & BADGES
═══════════════════════════════════════════════════ */
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.3px}
.pill-g{background:var(--green-glow);color:var(--green);border:1px solid rgba(0,200,150,.3)}
.pill-r{background:var(--red-glow);color:var(--red);border:1px solid rgba(240,68,56,.3)}
.pill-y{background:var(--yellow-glow);color:var(--yellow);border:1px solid rgba(245,166,35,.25)}
.pill-b{background:var(--blue-glow);color:var(--blue);border:1px solid rgba(61,142,240,.3)}
.pill-p{background:var(--purple-glow);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.pill-d{background:var(--s4);color:var(--dim);border:1px solid var(--border)}

/* ═══════════════════════════════════════════════════
   ALERTS
═══════════════════════════════════════════════════ */
.alert{padding:10px 12px;border-radius:var(--rs);margin-bottom:8px;display:flex;gap:9px;align-items:flex-start}
.a-r{background:var(--red-glow);border:1px solid rgba(240,68,56,.3)}
.a-y{background:var(--yellow-glow);border:1px solid rgba(245,166,35,.25)}
.a-g{background:var(--green-glow);border:1px solid rgba(0,200,150,.25)}
.a-b{background:var(--blue-glow);border:1px solid rgba(61,142,240,.25)}
.a-p{background:var(--purple-glow);border:1px solid rgba(139,92,246,.25)}
.a-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.a-title{font-size:11px;font-weight:700;margin-bottom:2px}
.a-body{font-size:10px;color:var(--dim);line-height:1.5}

/* ═══════════════════════════════════════════════════
   PROGRESS BARS
═══════════════════════════════════════════════════ */
.pb-wrap{background:var(--s4);border-radius:99px;overflow:hidden;height:5px;margin:5px 0}
.pb{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.34,1.2,.64,1)}
.pb-thick{height:8px}
.pb-sm{height:3px}

/* ═══════════════════════════════════════════════════
   FORMS
═══════════════════════════════════════════════════ */
.fg{margin-bottom:11px}
.fg label{display:block;font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.inp{width:100%;background:var(--s3);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:9px 12px;font-size:13px;outline:none;transition:border-color .2s;font-family:inherit}
.inp:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow)}
select.inp option{background:var(--s2)}

/* ═══════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════ */
.btn{padding:10px 16px;border-radius:var(--rs);border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;letter-spacing:.2px}
.btn:active{transform:scale(.95)}
.btn-p{background:var(--green);color:#fff;box-shadow:0 3px 12px rgba(0,200,150,.3)}
.btn-p:hover{background:var(--green2)}
.btn-s{background:var(--s4);color:var(--text);border:1px solid var(--border)}
.btn-d{background:var(--red-glow);color:var(--red);border:1px solid rgba(240,68,56,.3)}
.btn-y{background:var(--yellow-glow);color:var(--yellow);border:1px solid rgba(245,166,35,.3)}
.btn-w{width:100%}
.btn-sm{padding:5px 10px;font-size:10px;border-radius:7px}
.del-btn{background:transparent;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:3px 6px;border-radius:5px;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;transition:background .15s}
.del-btn:hover{background:var(--red-glow)}
.edit-btn{background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:3px 6px;border-radius:5px;font-family:inherit;transition:all .15s}
.edit-btn:hover{color:var(--text);background:var(--s4)}

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
.modal{background:var(--s1);border-radius:22px 22px 0 0;padding:16px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,.5)}
.mh{width:32px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 14px}
.mt{font-size:15px;font-weight:800;margin-bottom:13px}

/* ═══════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════ */
.tabs{display:flex;background:var(--s3);border-radius:var(--rs);padding:3px;gap:2px;margin-bottom:11px}
.tab{flex:1;padding:6px 4px;border:none;background:transparent;color:var(--dim);font-size:10px;font-weight:700;border-radius:7px;cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.2px}
.tab.on{background:var(--s1);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2)}

/* ═══════════════════════════════════════════════════
   MONTH NAV
═══════════════════════════════════════════════════ */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:8px 12px}
.mnav-btn{background:var(--s3);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:4px 12px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;transition:all .15s}
.mnav-btn:hover{border-color:var(--green);color:var(--green)}
.mnav-title{font-size:13px;font-weight:800;text-align:center}
.mnav-sub{font-size:9px;color:var(--dim);text-align:center;margin-top:1px}

/* ═══════════════════════════════════════════════════
   CALENDAR
═══════════════════════════════════════════════════ */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;font-size:11px;font-weight:500;position:relative;cursor:pointer;transition:background .15s}
.cal-day:hover{background:var(--s4)}
.cal-day.today{background:var(--green-glow);color:var(--green);font-weight:800;box-shadow:inset 0 0 0 1px rgba(0,200,150,.4)}
.cal-day.other-m{color:var(--dim2);pointer-events:none}
.cal-day.has-pay::after,.cal-day.has-inc::after,.cal-day.has-tc::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%}
.cal-day.has-pay::after{background:var(--red)}
.cal-day.has-inc::after{background:var(--green)}
.cal-day.has-tc::after{background:var(--blue)}

/* ═══════════════════════════════════════════════════
   ITEM ROWS
═══════════════════════════════════════════════════ */
.item-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(42,54,80,.5)}
.item-row:last-child{border-bottom:none}
.item-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.item-body{flex:1;min-width:0;margin-left:8px}
.item-title{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-sub{font-size:9px;color:var(--dim);margin-top:1px}
.item-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:6px}

/* ═══════════════════════════════════════════════════
   SEMAPHORE
═══════════════════════════════════════════════════ */
.sem{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative}
.sem::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid currentColor;opacity:.3;animation:pulse 2.5s infinite}
.hero-card{position:relative;overflow:hidden;border-radius:20px;padding:18px;margin-bottom:10px}
.hero-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none}
.hero-card::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;opacity:.08;pointer-events:none}
.hero-g{background:linear-gradient(135deg,rgba(0,200,150,.18),rgba(0,160,122,.08));border:1px solid rgba(0,200,150,.25)}
.hero-g::after{background:var(--green)}
.hero-y{background:linear-gradient(135deg,rgba(245,166,35,.18),rgba(200,130,20,.08));border:1px solid rgba(245,166,35,.25)}
.hero-y::after{background:var(--yellow)}
.hero-r{background:linear-gradient(135deg,rgba(240,68,56,.18),rgba(192,40,40,.08));border:1px solid rgba(240,68,56,.25)}
.hero-r::after{background:var(--red)}
.hero-b{background:linear-gradient(135deg,rgba(61,142,240,.18),rgba(40,100,200,.08));border:1px solid rgba(61,142,240,.25)}
.hero-b::after{background:var(--blue)}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.kpi-card{background:var(--s2);border-radius:14px;padding:11px 10px;position:relative;overflow:hidden;transition:transform .15s}
.kpi-card:active{transform:scale(.97)}
.kpi-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.kpi-g::before{background:linear-gradient(90deg,var(--green),var(--teal))}
.kpi-r::before{background:linear-gradient(90deg,var(--red),#ff6b6b)}
.kpi-b::before{background:linear-gradient(90deg,var(--blue),#60a5fa)}
.kpi-p::before{background:linear-gradient(90deg,var(--purple),#a78bfa)}
.kpi-o::before{background:linear-gradient(90deg,var(--orange),#fb923c)}
.kpi-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-bottom:5px}
.kpi-val{font-size:16px;font-weight:900;font-family:monospace;line-height:1}
.kpi-sub{font-size:8px;color:var(--dim2);margin-top:3px}
.score-hero{display:flex;align-items:center;gap:12px;background:var(--s2);border-radius:14px;padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:transform .15s}
.score-hero:active{transform:scale(.98)}
.month-prog{background:var(--s2);border-radius:14px;padding:11px 13px;margin-bottom:8px}
.glass-alert{background:rgba(61,142,240,.1);backdrop-filter:blur(10px);border:1px solid rgba(61,142,240,.2);border-radius:12px;padding:10px 12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.08);opacity:.15}}
.sem-g{background:var(--green-glow);color:var(--green)}
.sem-y{background:var(--yellow-glow);color:var(--yellow)}
.sem-r{background:var(--red-glow);color:var(--red)}

/* ═══════════════════════════════════════════════════
   SCORE RING
═══════════════════════════════════════════════════ */
.score-ring-wrap{display:flex;align-items:center;gap:14px}
.score-ring{position:relative;width:80px;height:80px;flex-shrink:0}
.score-ring svg{width:80px;height:80px;transform:rotate(-90deg)}
.score-ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-num{font-size:20px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1}
.score-txt{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);margin-top:1px}

/* ═══════════════════════════════════════════════════
   CANVAS CHARTS
═══════════════════════════════════════════════════ */
canvas{display:block;width:100%!important;border-radius:6px}
.chart-label{font-size:9px;color:var(--dim);text-align:center;margin-top:5px}

/* ═══════════════════════════════════════════════════
   LEGEND
═══════════════════════════════════════════════════ */
.legend{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
.leg-item{display:flex;align-items:center;gap:6px}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.leg-name{flex:1;font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leg-val{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace}
.leg-pct{font-size:9px;color:var(--dim);margin-left:3px}

/* ═══════════════════════════════════════════════════
   COMPARISON BAR
═══════════════════════════════════════════════════ */
.cmp-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.cmp-lbl{font-size:10px;color:var(--dim);width:55px;flex-shrink:0}
.cmp-bar-wrap{flex:1;height:5px;background:var(--s4);border-radius:99px;overflow:hidden}
.cmp-bar-fill{height:100%;border-radius:99px;transition:width .5s}
.cmp-val{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;width:40px;text-align:right;flex-shrink:0}

/* ═══════════════════════════════════════════════════
   PAGE ANIMATION
═══════════════════════════════════════════════════ */
.page{animation:pg-in .2s ease}
@keyframes pg-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════════════
   DONUT WRAP
═══════════════════════════════════════════════════ */
.donut-wrap{display:flex;align-items:center;gap:12px}
.donut-canvas{flex-shrink:0}

/* ═══════════════════════════════════════════════════
   PROJECTED CASH FLOW
═══════════════════════════════════════════════════ */
.cashflow-day{display:inline-flex;flex-direction:column;align-items:center;gap:2px;font-size:8px}
.cashflow-bar-neg{background:var(--red);opacity:.7}

var SUPA_URL = 'https://tcsoxmblzifnztjdughj.supabase.co';
var SUPA_KEY = 'sb_publishable_D2ciwhxM8UyHTbjfT8Fmhg_j_CQ1lMp';
var supabase = true; // always "available" - we use REST directly
var currentUser = null;

function initSupabase() {
  // Load saved session from localStorage
  try {
    var saved = localStorage.getItem('finar_session');
    if (saved) {
      var sess = JSON.parse(saved);
      if (sess.access_token && sess.user) {
        authToken = sess.access_token;
        currentUser = sess.user;
      }
    }
  } catch(e) {}
  return true;
}

// ── REST helper ───────────────────────────────────────────────────────────────
async function supaRest(method, path, body, useAuth, extraHeaders) {
  var headers = {
    'Content-Type': 'application/json',
    'apikey': SUPA_KEY,
    'Prefer': 'return=representation'
  };
  if (useAuth && authToken) headers['Authorization'] = 'Bearer ' + authToken;
  if (extraHeaders) {
    var keys = Object.keys(extraHeaders);
    for (var i = 0; i < keys.length; i++) headers[keys[i]] = extraHeaders[keys[i]];
  }
  var opts = { method: method, headers: headers };
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(SUPA_URL + path, opts);
  var json = await r.json();
  return { ok: r.ok, status: r.status, data: json };
}

// ── Auth functions ────────────────────────────────────────────────────────────
var supabaseAuth = {
  signUp: async function(email, password) {
    var r = await supaRest('POST', '/auth/v1/signup', {email: email, password: password}, false);
    if (!r.ok) return { error: { message: r.data.error_description || r.data.msg || 'Error al registrarse' } };
    // Supabase returns user without access_token if already registered
    if (r.data.user && !r.data.access_token && r.data.user.identities && r.data.user.identities.length === 0) {
      return { error: { message: 'Este email ya esta registrado. Usa "Iniciar sesion".' } };
    }
    if (r.data.access_token) {
      authToken = r.data.access_token;
      currentUser = r.data.user;
      localStorage.setItem('finar_session', JSON.stringify({access_token: authToken, user: currentUser}));
    }
    return { data: r.data, error: null };
  },
  signIn: async function(email, password) {
    var r = await supaRest('POST', '/auth/v1/token?grant_type=password', {email: email, password: password}, false);
    if (!r.ok) return { error: { message: r.data.error_description || r.data.msg || 'Email o contrasena incorrectos' } };
    authToken = r.data.access_token;
    currentUser = r.data.user;
    localStorage.setItem('finar_session', JSON.stringify({access_token: authToken, user: currentUser}));
    return { data: r.data, error: null };
  },
  signOut: async function() {
    authToken = null; currentUser = null;
    localStorage.removeItem('finar_session');
  },
  getSession: function() {
    if (authToken && currentUser) return { data: { session: { user: currentUser } } };
    return { data: { session: null } };
  }
};

function generateRandom(len) {

  return Array.from(arr).map(function(b) { return ('0' + b.toString(16)).slice(-2); }).join('');
}

async function generateCodeChallenge(verifier) {
  var enc = new TextEncoder();
  var data = enc.encode(verifier);
  var digest = await window.crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function handleOAuthCallback() {
  var search = window.location.search;
  var hash = window.location.hash;
  console.log('OAuth callback check - search:', search, 'hash:', hash ? hash.substring(0,50) : '');

  // Caso: Supabase devolvió error
  if (search && search.indexOf('error=') !== -1) {
    var qp = {};
    search.replace('?','').split('&').forEach(function(p) {
      var kv = p.split('='); qp[decodeURIComponent(kv[0])] = decodeURIComponent((kv[1]||'').replace(/\+/g,' '));
    });
    console.log('Supabase error:', qp.error, qp.error_description || qp.error_code);
    history.replaceState(null, '', window.location.pathname);
    return false;
  }

  // Caso 1: token en hash (implicit flow)
  if (hash && hash.indexOf('access_token') !== -1) {
    var params = {};
    hash.replace('#','').split('&').forEach(function(p) {
      var kv = p.split('='); params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
    });
    if (params.access_token) {
      console.log('OAuth: token en hash OK, guardando y recargando...');
      localStorage.setItem('finar_session', JSON.stringify({access_token: params.access_token, user: {id: params.user_id || '', email: ''}}));
      // Fetch user info
      try {
        var ur = await fetch(SUPA_URL + '/auth/v1/user', {
          headers: { 'Authorization': 'Bearer ' + params.access_token, 'apikey': SUPA_KEY }
        });
        var ud = await ur.json();
        if (ud && ud.id) {
          localStorage.setItem('finar_session', JSON.stringify({access_token: params.access_token, user: ud}));
        }
      } catch(e3) {}
      // Recargar la página limpia — el startup normal tomará la sesión del localStorage
      window.location.replace(window.location.pathname);
      return true;
    }
  }

  // Caso 2: code en query string (PKCE flow)
  if (search && search.indexOf('code=') !== -1) {
    var qparams = {};
    search.replace('?','').split('&').forEach(function(p) {
      var kv = p.split('='); qparams[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
    });
    var code = qparams['code'];
    var verifier = sessionStorage.getItem('pkce_verifier');
    console.log('OAuth PKCE: code=', code ? 'OK' : 'null', 'verifier=', verifier ? 'OK' : 'MISSING');
    if (code && verifier) {
      try {
        var resp = await fetch(SUPA_URL + '/auth/v1/token?grant_type=pkce', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPA_KEY },
          body: JSON.stringify({ auth_code: code, code_verifier: verifier })
        });
        var data = await resp.json();
        console.log('PKCE exchange response status:', resp.status, 'has token:', !!data.access_token);
        if (data.access_token) {
          localStorage.setItem('finar_session', JSON.stringify({access_token: data.access_token, user: data.user}));
          sessionStorage.removeItem('pkce_verifier');
          window.location.replace(window.location.pathname);
          return true;
        } else {
          console.log('PKCE error:', JSON.stringify(data).substring(0,200));
        }
      } catch(e) {
        console.log('PKCE exchange error:', e);
      }
    } else if (code && !verifier) {
      // No verifier — intentar sin PKCE (exchange directo no estándar, último recurso)
      console.log('No verifier - limpiando URL');
      history.replaceState(null, '', window.location.pathname);
    }
  }

  return false;
}

      // cuotaActual is unreliable (old code set it to cuotasTotal on payment)
      if (p.gastosTC && p.tarjetas) {
        p.gastosTC.forEach(function(g) {
          var tc = p.tarjetas.find(function(t){return t.id===g.tcId;});
          if (!tc || !tc.ultimoPago) {
            // No payment registered: nothing is paid
            g.pagadaHastaOffset = null;
            if (g.pendientes === 0) g.pendientes = g.cuotasTotal;
            g.cuotaActual = 1;
            return;

          // Determine purchase cycle using basic date math (getCicloCompra not available yet)

          var purchaseM = fc.getMonth(), purchaseY = fc.getFullYear();
          // offset = months between purchase cycle and paid cycle
          var offset = (paidY - purchaseY) * 12 + (paidM - purchaseM);
          if (offset < 0) {

            g.pagadaHastaOffset = null;

function getCuotaUVA(prestamo) {
  if (prestamo.tipo === 'uva' && prestamo.cantidadUVAs && getValorUVA()) {
    // Also recalc capital/interest split for current cuota (French system)
    if (prestamo.capitalOrigUVAs && prestamo.tasaUVA) {

      var n = prestamo.cuotaTotal;
      var k = prestamo.cuotaN;
      if (tm > 0) {
        var saldoK = prestamo.capitalOrigUVAs * (Math.pow(1+tm, n) - Math.pow(1+tm, k-1)) / (Math.pow(1+tm, n) - 1);
        var interesK = saldoK * tm;
        prestamo.capitalUVAs = prestamo.cantidadUVAs - interesK;
      }
    }
    return Math.round(prestamo.cantidadUVAs * getValorUVA());
  }
  return prestamo.cuota;
}
function inflAct() {
  var arr = S.inflaciones.slice().sort(function(a, b) { return b.anio - a.anio || b.mes - a.mes; });
  return arr.length ? arr[0].valor / 100 : 0.04;
}
function totalPrest() { return S.prestamos.reduce(function(s, p) { return s + p.cuota; }, 0); }
function combEst() { if (!S.config.usaAuto) return 0; return S.config.kmDiarios / 100 * S.config.consumoL * S.config.diasHabil * S.config.precioComb; }
function compFijosGasto() { return S.compromisos.filter(function(c) { return c.tipo === 'gasto'; }).reduce(function(s, c) { return s + c.monto; }, 0); }
function compFijosIngreso() { return S.compromisos.filter(function(c) { return c.tipo === 'ingreso'; }).reduce(function(s, c) { return s + c.monto; }, 0); }

function movsDelMes(y, m) {
  return S.movimientos.filter(function(mv) {
    var d = new Date(mv.fecha + 'T12:00:00');
    return d.getFullYear() === y && d.getMonth() === m;
  });
}
function ingMov(y, m) { return movsDelMes(y, m).filter(function(m) { return m.tipo === 'ingreso' && m.cat !== 'Transferencia'; }).reduce(function(s, m) { return s + m.monto; }, 0); }
function gasMov(y, m) { return movsDelMes(y, m).filter(function(m) { return m.tipo === 'gasto' && m.cat !== 'Transferencia'; }).reduce(function(s, m) { return s + m.monto; }, 0); }
function ingMes(y, m) {
  // Only count real registered income movements
  // config.sueldo is only for reference/projections, not as real income
  return ingMov(y, m) + compFijosIngreso();
}
function saldoTotal() { return S.cuentas.filter(function(a) { return a.moneda === 'ARS'; }).reduce(function(s, a) { return s + a.saldo; }, 0); }

function catGastos(y, m) {
  var map = {};
  movsDelMes(y, m).filter(function(mv) { return mv.tipo === 'gasto'; }).forEach(function(mv) { map[mv.cat] = (map[mv.cat] || 0) + mv.monto; });
  return Object.keys(map).map(function(n) { return {n: n, v: map[n]}; }).sort(function(a, b) { return b.v - a.v; });
}

function gasXDia(y, m) {
  var dim = dimEnMes(y, m), arr = new Array(dim).fill(0);
  movsDelMes(y, m).filter(function(mv) { return mv.tipo === 'gasto'; }).forEach(function(mv) {
    var d = new Date(mv.fecha + 'T12:00:00').getDate() - 1;
    if (d >= 0 && d < dim) arr[d] += mv.monto;
  });
  return arr;
}

// Projected daily cash flow
function proyFlujoMes(y, m) {
  var dim = dimEnMes(y, m);
  var ing = ingMes(y, m);
  var gasD = gasXDia(y, m);
  var compD = (totalPrest() + compFijosGasto() + combEst()) / dim;
  var saldoBase = saldoTotal();
  var result = [];
  var acum = saldoBase;
  for (var d = 0; d < dim; d++) {
    var ingD = d === 0 ? ing * 0.4 : (d === Math.floor(dim / 2) ? ing * 0.6 : 0);
    acum = acum + ingD - gasD[d] - compD;
    result.push({dia: d + 1, saldo: acum, negativo: acum < 0});
  }
  return result;
}

// Score financiero (0-100)
// ═══════════════════════════════════════════════════════════
// SCORE FINANCIERO MEJORADO
// ═══════════════════════════════════════════════════════════
function calcScore() {
  var ingEsp = S.config.sueldo + compFijosIngreso();
  var ingMov2 = ingMov(TY, TM);
  var ing = ingMov2 > ingEsp * 0.5 ? ingMov2 : ingEsp;
  var gas = gasMov(TY, TM);
  var prest = totalPrest();
  var saldo = saldoTotal();
  var libre = ing - gas - prest - compFijosGasto() - combEst();
  var inflAcum = S.inflaciones.reduce(function(s,i){return s*(1+i.valor/100);},1);

  // 1. RATIO DEUDA/INGRESO (35 pts)
  var ratioDeuda = prest / Math.max(ing, 1);
  var ptsDeuda = ratioDeuda <= 0.20 ? 35 :
                 ratioDeuda <= 0.30 ? 28 :
                 ratioDeuda <= 0.40 ? 18 :
                 ratioDeuda <= 0.55 ? 8 : 0;

  // 2. LIQUIDEZ - meses de gastos cubiertos (25 pts)
  var gastoMensual = Math.max(gas + prest + compFijosGasto() + combEst(), 1);
  var mesesLiquidez = saldo / gastoMensual;
  var ptsLiquidez = mesesLiquidez >= 3 ? 25 :
                    mesesLiquidez >= 2 ? 20 :
                    mesesLiquidez >= 1 ? 12 :
                    mesesLiquidez >= 0.5 ? 6 : 0;

  // 3. TASA DE AHORRO REAL (25 pts)
  var tasaAhorro = libre / Math.max(ing, 1);
  var ptsAhorro = tasaAhorro >= 0.20 ? 25 :
                  tasaAhorro >= 0.12 ? 20 :
                  tasaAhorro >= 0.06 ? 13 :
                  tasaAhorro >= 0.01 ? 6 : 0;

  // 4. DIVERSIFICACION - penaliza todo en ARS (15 pts)
  var totalActARS = saldo;
  var totalActCed = S.cedears.reduce(function(s,c){return s+c.cant*c.precioActual;},0);
  var totalActUSD = S.cuentas.filter(function(a){return a.moneda==='USD';}).reduce(function(s,a){return s+a.saldo*S.config.tipoCambio;},0);
  var totalAct = totalActARS + totalActCed + totalActUSD;
  var pctARS = totalAct > 0 ? totalActARS / totalAct : 1;
  var ptsDiversif = pctARS <= 0.40 ? 15 :
                    pctARS <= 0.60 ? 11 :
                    pctARS <= 0.75 ? 7 :
                    pctARS <= 0.90 ? 3 : 0;

  var total = Math.round(ptsDeuda + ptsLiquidez + ptsAhorro + ptsDiversif);
  var etiqueta = total >= 81 ? 'Excelente - escala inversiones' :
                 total >= 61 ? 'Bueno - diversifica mas' :
                 total >= 41 ? 'Estable - optimiza el ahorro' :
                 'En riesgo - prioriza cancelar deuda';

  return {
    total: total,
    etiqueta: etiqueta,
    deuda: Math.round(ptsDeuda / 35 * 100),
    liquidez: Math.round(ptsLiquidez / 25 * 100),
    ahorro: Math.round(ptsAhorro / 25 * 100),
    diversif: Math.round(ptsDiversif / 15 * 100),
    ptsDeuda: ptsDeuda, ptsLiquidez: ptsLiquidez,
    ptsAhorro: ptsAhorro, ptsDiversif: ptsDiversif,
    mesesLiquidez: mesesLiquidez.toFixed(1),
    tasaAhorro: (tasaAhorro * 100).toFixed(1),
    ratioDeuda: (ratioDeuda * 100).toFixed(1),
    pctARS: (pctARS * 100).toFixed(0)
  };
}

// ═══════════════════════════════════════════════════════════
// ALERTAS INTELIGENTES MEJORADAS
// ═══════════════════════════════════════════════════════════
function getRecomendaciones() {
  var recs = [];
  var ing = ingMes(TY, TM), gas = gasMov(TY, TM), prest = totalPrest();
  var libre = ing - gas - prest - compFijosGasto() - combEst();
  var ratioPrest = ing > 0 ? prest / ing : 0;
  var pM = TM === 0 ? 11 : TM - 1, pY = TM === 0 ? TY - 1 : TY;
  var gasP = gasMov(pY, pM);
  var inflAcum = S.inflaciones.reduce(function(s,i){return s*(1+i.valor/100);},1);

  // Deuda critica
  if (ratioPrest > 0.4) recs.push({tipo:'r', icon:'\uD83D\uDEA8', titulo:'Sobreendeudamiento critico', msg:'Tus prestamos consumen el ' + (ratioPrest*100).toFixed(0) + '% de ingresos. Limite recomendado: 35%. No tomes nuevas deudas.'});
  else if (ratioPrest > 0.30) recs.push({tipo:'y', icon:'!', titulo:'Deuda moderada', msg:'Prestamos en ' + (ratioPrest*100).toFixed(0) + '% de ingresos. Evita nuevas cuotas.'});

  // Flujo de caja - dias en rojo
  var flujo = flujoCajaDiarioReal(TY, TM);
  if (flujo.diasNegativos > 0) {
    recs.push({tipo:'r', icon:'\uD83D\uDCC9', titulo:'Vas a quedar en rojo el dia ' + flujo.diaMinsaldo, msg:'Saldo minimo proyectado: ' + fmtK(flujo.minSaldo) + '. Tenes ' + flujo.diasNegativos + ' dia' + (flujo.diasNegativos>1?'s':'') + ' en negativo este mes.'});
  }

  // Cuota UVA proxima
  var uva = S.prestamos.find(function(p){return p.tipo==='uva';});
  if (uva) {
    var proxCuota = uva.cuota * (1 + inflAct());
    var diff = proxCuota - uva.cuota;
    if (diff > 1000) recs.push({tipo:'y', icon:'\uD83C\uDFE0', titulo:'Cuota UVA sube $' + fmtK(diff) + ' el proximo mes', msg:'De ' + fmt(uva.cuota) + ' a estimado ' + fmt(proxCuota) + ' con inflacion ' + (inflAct()*100).toFixed(1) + '% mensual.'});
  }

  // Tarjetas subieron
  var totalTC = S.tarjetas.reduce(function(s,t){return s+consumoTC(t.id);},0);
  var gastosTC_prev = S.gastosTC.filter(function(g){
    var f = new Date(g.fechaCompra+'T12:00:00');
    return f.getFullYear()===pY && f.getMonth()===pM && g.pendientes>0;
  }).reduce(function(s,g){return s+g.montoCuota;},0);
  if (gastosTC_prev > 0 && totalTC > gastosTC_prev * 1.2) {
    recs.push({tipo:'y', icon:'\uD83D\uDCB3', titulo:'Deuda en tarjetas subio ' + ((totalTC/gastosTC_prev-1)*100).toFixed(0) + '%', msg:'De ' + fmtK(gastosTC_prev) + ' a ' + fmtK(totalTC) + ' vs mes anterior.'});
  }

  // Inflacion: patrimonio vs inflacion
  var rendCed = (function(){
    var inv = S.cedears.reduce(function(s,c){return s+c.cant*c.precioCompra;},0);
    var act = S.cedears.reduce(function(s,c){return s+c.cant*c.precioActual;},0);
    return inv > 0 ? (act-inv)/inv*100 : 0;
  })();
  var inflTotal = (inflAcum-1)*100;
  if (rendCed > 0 && rendCed > inflTotal) {
    recs.push({tipo:'g', icon:'\uD83D\uDCC8', titulo:'CEDEARs le ganan a la inflacion', msg:'Rendimiento: +' + rendCed.toFixed(1) + '% vs inflacion acumulada ' + inflTotal.toFixed(1) + '%. Diferencia real: +' + (rendCed-inflTotal).toFixed(1) + ' puntos.'});
  } else if (rendCed > 0 && rendCed < inflTotal) {
    recs.push({tipo:'y', icon:'\uD83D\uDD25', titulo:'CEDEARs pierden contra la inflacion', msg:'Rendimiento: +' + rendCed.toFixed(1) + '% vs inflacion ' + inflTotal.toFixed(1) + '%. Perdida real: ' + (rendCed-inflTotal).toFixed(1) + ' puntos.'});
  }

  // Libre para invertir
  if (libre > S.config.metaAhorro * 1.5) recs.push({tipo:'g', icon:'\uD83D\uDCA1', titulo:'Podes invertir ' + fmtK(libre - S.config.metaAhorro) + ' este mes', msg:'Tu saldo libre supera la meta de ahorro. Considera aumentar el aporte a CEDEARs o cancelar deuda.'});

  // Gastos subieron
  if (gasP > 0 && gas > gasP * 1.15) recs.push({tipo:'y', icon:'\uD83D\uDCC8', titulo:'Gastos subieron ' + ((gas/gasP-1)*100).toFixed(0) + '%', msg:'Este mes gastaste ' + fmtK(gas-gasP) + ' mas que en ' + MC[pM] + '.'});

  // Diversificacion
  var saldo = saldoTotal();
  var totalActivos = saldo + S.cedears.reduce(function(s,c){return s+c.cant*c.precioActual;},0);
  if (totalActivos > 0 && saldo/totalActivos > 0.85) {
    recs.push({tipo:'y', icon:'\uD83C\uDDE6\uD83C\uDDF7', titulo:'85% de tus activos en ARS', msg:'Alta exposicion al peso. Considera diversificar en CEDEARs o USD para cobertura contra inflacion.'});
  }

  if (!recs.length) recs.push({tipo:'g', icon:'OK', titulo:'Finanzas saludables', msg:'Estas dentro de los parametros recomendados. Seguí así.'});
  return recs;
}

// ═══════════════════════════════════════════════════════════
// TIR DE CEDEARs
// ═══════════════════════════════════════════════════════════
function calcTIR(cedear) {
  var inv = cedear.cant * cedear.precioCompra;
  var act = cedear.cant * cedear.precioActual;
  if (inv <= 0) return {tir:0, tirReal:0, vsInflacion:0, vsUSD:0};

  // Estimate holding period from state (use inflaciones count as proxy for months)
  var meses = Math.max(S.inflaciones.length, 1);
  var anios = meses / 12;

  var tirNominal = anios > 0 ? (Math.pow(act/inv, 1/anios) - 1) * 100 : 0;
  var inflAcum = S.inflaciones.reduce(function(s,i){return s*(1+i.valor/100);},1);
  var inflAnual = (Math.pow(inflAcum, 12/meses) - 1) * 100;

  // TIR real = (1 + TIR nominal) / (1 + inflacion) - 1
  var tirReal = ((1 + tirNominal/100) / (1 + inflAnual/100) - 1) * 100;

  // vs USD: if bought at TC X and selling at TC Y
  var invUSD = S.config.tipoCambio > 0 ? inv / S.config.tipoCambio : 0;
  var actUSD = S.config.tipoCambio > 0 ? act / S.config.tipoCambio : 0;
  var vsUSD = invUSD > 0 ? (actUSD - invUSD) / invUSD * 100 : 0;

  return {
    tirNominal: tirNominal.toFixed(1),
    tirReal: tirReal.toFixed(1),
    inflAnual: inflAnual.toFixed(1),
    vsUSD: vsUSD.toFixed(1),
    meses: meses,
    ganancia: act - inv,
    gananciaPct: ((act-inv)/inv*100).toFixed(1)
  };
}

// ═══════════════════════════════════════════════════════════
// SIMULADOR DEUDAS: AVALANCHE vs SNOWBALL
// ═══════════════════════════════════════════════════════════
function simDeudas(extraMensual) {
  extraMensual = extraMensual || 0;

  // Build debt list with estimated rates
  var deudas = S.prestamos.filter(function(p) {
    // Only include active loans with remaining cuotas
    return p.cuotaN <= p.cuotaTotal;
  }).map(function(p) {
    var rest = Math.max(1, p.cuotaTotal - p.cuotaN + 1);
    var tasa = p.tasaAnual ? p.tasaAnual : (p.tipo === 'uva' ? inflAct() * 100 * 12 : 60);
    return {
      id: p.id,
      nombre: p.nombre,
      cuota: p.cuota,
      saldo: p.cuota * rest,
      tasa: tasa / 12, // monthly rate
      tipo: p.tipo
    };
  });

  if (!deudas.length) return null;

  function simStrategy(sorted, extra) {
    var ds = sorted.map(function(d){ return {nombre:d.nombre, saldo:d.saldo, cuota:d.cuota, tasa:d.tasa}; });
    var mes = 0;
    var totalIntereses = 0;
    while (ds.some(function(d){return d.saldo > 0;}) && mes < 360) {
      var extraDisp = extra;
      ds.forEach(function(d, i) {
        if (d.saldo <= 0) return;
        var interesMes = d.saldo * d.tasa / 100; // tasa ya es mensual
        var pago = d.cuota + (i === 0 ? extraDisp : 0);
        pago = Math.min(pago, d.saldo + interesMes);
        totalIntereses += interesMes;
        d.saldo = Math.max(0, d.saldo + interesMes - pago);
        if (d.saldo <= 0) { extraDisp += d.cuota; }
      });
      mes++;
    }
    return {meses: mes, totalIntereses: Math.round(totalIntereses)};
  }

  // Avalanche: highest rate first
  var avalanche = deudas.slice().sort(function(a,b){return b.tasa-a.tasa;});
  var resAval = simStrategy(avalanche, extraMensual);

  // Snowball: lowest balance first
  var snowball = deudas.slice().sort(function(a,b){return a.saldo-b.saldo;});
  var resSnow = simStrategy(snowball, extraMensual);

  // Base: no extra
  var base = deudas.slice().sort(function(a,b){return b.tasa-a.tasa;});
  var resBase = simStrategy(base, 0);

  return {
    base: resBase,
    avalanche: resAval,
    snowball: resSnow,
    totalDeuda: deudas.reduce(function(s,d){return s+d.saldo;},0),
    cuotaTotal: deudas.reduce(function(s,d){return s+d.cuota;},0)
  };
}

// ═══════════════════════════════════════════════════════════
// SIMULADOR PROYECCION 5/10/20 ANIOS
// ═══════════════════════════════════════════════════════════
function simProyeccion(anios, aporteMensual, rendAnualUSD, escenario) {
  var capIni = S.cedears.reduce(function(s,c){return s+c.cant*c.precioActual;},0) +
               S.cuentas.filter(function(a){return a.moneda==='USD';}).reduce(function(s,a){return s+a.saldo*S.config.tipoCambio;},0);

  // Inflation scenarios
  var inflMensual = escenario === 'opt' ? 0.02 : escenario === 'pes' ? 0.06 : inflAct();

  // USD return monthly
  var rendMensual = rendAnualUSD / 100 / 12;

  var saldo = capIni;
  var totalAportado = capIni;
  var hitos = [];

  for (var m = 1; m <= anios * 12; m++) {
    saldo = saldo * (1 + rendMensual) + aporteMensual;
    totalAportado += aporteMensual;
    if (m % 12 === 0) {
      var anio = m / 12;
      var inflAcumPeriodo = Math.pow(1 + inflMensual, m);
      hitos.push({
        anio: anio,
        nominal: Math.round(saldo),
        real: Math.round(saldo / inflAcumPeriodo),
        aportado: Math.round(totalAportado),
        ganancia: Math.round(saldo - totalAportado),
        enUSD: Math.round(saldo / S.config.tipoCambio)
      });
    }
  }
  return {hitos: hitos, capIni: capIni, totalAportado: Math.round(totalAportado)};
}


// ═══════════════════════════════════════════════════════════
// CIERRE MENSUAL Y ARRASTRE
// ═══════════════════════════════════════════════════════════
function getCierreMes(y, m) {
  return S.cierresMes.find(function(c){ return c.anio===y && c.mes===m; });
}

function calcResultadoMes(y, m) {
  var ing = ingMov(y, m) || (ingMes(y,m));
  var gas = gasMov(y, m);
  var comp = totalPrest() + compFijosGasto() + combEst();
  return ing - gas - comp;
}

function cerrarMes(y, m, saldoFinal) {
  // Remove existing if any
  S.cierresMes = S.cierresMes.filter(function(c){ return !(c.anio===y && c.mes===m); });
  var ing = ingMov(y, m) || ingMes(y, m);
  var gas = gasMov(y, m);
  var comp = totalPrest() + compFijosGasto() + combEst();
  S.cierresMes.push({
    anio: y, mes: m,
    ingresos: Math.round(ing),
    gastos: Math.round(gas),
    compromisos: Math.round(comp),
    resultado: Math.round(ing - gas - comp),
    saldoFinal: Math.round(saldoFinal || saldoTotal()),
    fecha: new Date().toISOString().slice(0,10)
  });
  // Keep max 24 months
  S.cierresMes.sort(function(a,b){ return a.anio!==b.anio?a.anio-b.anio:a.mes-b.mes; });
  if (S.cierresMes.length > 24) S.cierresMes = S.cierresMes.slice(-24);
  save();
}

function getSaldoInicialMes(y, m) {
  // Get saldo inicial for a given month from previous month's cierre
  var pm = m === 0 ? 11 : m - 1;
  var py = m === 0 ? y - 1 : y;
  var prev = getCierreMes(py, pm);
  return prev ? prev.saldoFinal : saldoTotal();
}

function recalcCierre(y, m) {
  // Recalculate an existing auto-cierre when movements change
  var existing = getCierreMes(y, m);
  if (!existing) return; // Only recalc if already exists
  var ing = ingMov(y, m) || ingMes(y, m);
  var gas = gasMov(y, m);
  var comp = totalPrest() + compFijosGasto() + combEst();
  existing.ingresos = Math.round(ing);
  existing.gastos = Math.round(gas);
  existing.compromisos = Math.round(comp);
  existing.resultado = Math.round(ing - gas - comp);
  existing.saldoFinal = Math.round(saldoTotal());
  existing.fecha = new Date().toISOString().slice(0,10);
  save();
}

function autoCheckCierre() {
  // Auto-close previous month if not closed yet
  var pm = TM === 0 ? 11 : TM - 1;
  var py = TM === 0 ? TY - 1 : TY;
  if (!getCierreMes(py, pm)) {
    var ing = ingMov(py, pm) || ingMes(py, pm);
    var gas = gasMov(py, pm);
    var comp = totalPrest() + compFijosGasto() + combEst();
    var resultado = ing - gas - comp;
    // saldoFinal: the current account balance IS the best estimate of where
    // the previous month ended - no need to subtract, the accounts already
    // reflect everything that happened up to now.
    var saldoFinal = saldoTotal();
    S.cierresMes.push({
      anio: py, mes: pm,
      ingresos: Math.round(ing),
      gastos: Math.round(gas),
      compromisos: Math.round(comp),
      resultado: Math.round(resultado),
      saldoFinal: Math.round(saldoFinal),
      fecha: new Date().toISOString().slice(0,10),
      auto: true
    });
    S.cierresMes.sort(function(a,b){ return a.anio!==b.anio?a.anio-b.anio:a.mes-b.mes; });
    if (S.cierresMes.length > 24) S.cierresMes = S.cierresMes.slice(-24);
    save();
  }
}

// ═══════════════════════════════════════════════════════════
// FLUJO DE CAJA DIARIO REAL
// ═══════════════════════════════════════════════════════════
function flujoCajaDiarioReal(y, m) {
  var dim = dimEnMes(y, m);
  var saldoInicial = saldoTotal();
  var ingresos = new Array(dim).fill(0);
  var egresos = new Array(dim).fill(0);

  // Sueldo - dia hábil anterior al 28
  var dSueldo = getSueldo(y, m);
  if (dSueldo.getMonth() === m) ingresos[dSueldo.getDate()-1] += S.config.sueldo;

  // Compromisos fijos
  S.compromisos.forEach(function(c) {
    var d = Math.min(c.diaMes, dim) - 1;
    if (c.tipo === 'ingreso') ingresos[d] += c.monto;
    else egresos[d] += c.monto;
  });

  // Préstamos
  S.prestamos.forEach(function(p) {
    var d = Math.min(p.diaPago || 28, dim) - 1;
    egresos[d] += p.cuota;
  });

  // Gastos variables del mes
  movsDelMes(y, m).forEach(function(mv) {
    var d = new Date(mv.fecha+'T12:00:00').getDate() - 1;
    if (d >= 0 && d < dim) {
      if (mv.tipo === 'ingreso') ingresos[d] += mv.monto;
      else egresos[d] += mv.monto;
    }
  });

  // Combustible distribuido en días hábiles
  var combDiario = combEst() / S.config.diasHabil;
  for (var i = 0; i < dim; i++) {
    var dow = new Date(y, m, i+1).getDay();
    if (dow !== 0 && dow !== 6) egresos[i] += combDiario;
  }

  var result = [], saldo = saldoInicial;
  var minSaldo = Infinity, diaMinsaldo = 1;
  for (var d2 = 0; d2 < dim; d2++) {
    saldo += ingresos[d2] - egresos[d2];
    if (saldo < minSaldo) { minSaldo = saldo; diaMinsaldo = d2+1; }
    result.push({dia:d2+1, saldo:Math.round(saldo), negativo:saldo<0,
      ingreso:ingresos[d2], egreso:egresos[d2]});
  }
  result.minSaldo = minSaldo;
  result.diaMinsaldo = diaMinsaldo;
  result.diasNegativos = result.filter(function(d){return d.negativo;}).length;
  return result;
}

// TC helpers

function getCierre(tc, y, m) {
  if (tc.cierreRegla === 'dia_fijo' && tc.cierreDia) return new Date(y, m, Math.min(tc.cierreDia, dimEnMes(y,m)));
  return tc.cierreRegla === '2do_jueves' ? getNthWD(y, m, 4, 2) : getPenultJueves(y, m);
}
function getVence(tc, y, m) {
  var cierre = getCierre(tc, y, m); if (!cierre) return null;
  var cDia = cierre.getDate();
  var cMes = cierre.getMonth();
  var cAnio = cierre.getFullYear();
  if (tc.venceDia) {
    // Si vence DIA > dia de cierre -> mismo mes que el cierre
    // Si vence DIA <= dia de cierre -> mes siguiente
    if (tc.venceDia > cDia) {
      return new Date(cAnio, cMes, tc.venceDia);
    } else {
      var vm = cMes + 1, vy = cAnio;
      if (vm > 11) { vm = 0; vy++; }
      return new Date(vy, vm, tc.venceDia);
    }
  }
  // Regla: 1er miercoles del mes siguiente
  var vm2 = cMes + 1, vy2 = cAnio;
  if (vm2 > 11) { vm2 = 0; vy2++; }
  return getNthWD(vy2, vm2, 3, 1);
}
function consumoTC(tcId) {
  return S.gastosTC.filter(function(g){ return g.tcId === tcId && g.pendientes > 0; }).reduce(function(s,g){ return s+g.montoCuota; }, 0);
}

// Find which billing cycle (year+month) a purchase date falls into for a given card
function getCicloCompra(tc, fechaCompra) {
  var fc = new Date(fechaCompra + 'T12:00:00');
  // Check months around the purchase date to find its cycle
  for (var di = -1; di <= 2; di++) {
    var cm = fc.getMonth() + di;
    var cy = fc.getFullYear();
    if (cm < 0) { cm += 12; cy--; }
    if (cm > 11) { cm -= 12; cy++; }
    var cierreEste = getCierre(tc, cy, cm);
    var pm2 = cm===0?11:cm-1, py2 = cm===0?cy-1:cy;
    var cierrePrev = getCierre(tc, py2, pm2);
    if (!cierreEste || !cierrePrev) continue;
    if (fc.getTime() > cierrePrev.getTime() && fc.getTime() <= cierreEste.getTime()) {
      return {y: cy, m: cm};
    }
  }
  // Fallback: use purchase month
  return {y: fc.getFullYear(), m: fc.getMonth()};
}

// Difference in months between two year/month pairs
function diffMeses(y1, m1, y2, m2) {
  return (y2 - y1) * 12 + (m2 - m1);
}

// Returns gastosTC items that have a cuota due in month (y, m) for a card
// For a purchase with N cuotas made in cycle C:
//   cuota 1 is in cycle C, cuota 2 in C+1, ..., cuota N in C+(N-1)
function getCuotasMes(tcId, y, m) {
  var tc = S.tarjetas.find(function(t){return t.id===tcId;});
  if (!tc) return [];
  // Show ALL gastosTC items in their correct month, even if pendientes=0
  // (pendientes=0 just means paid, not invisible)
  return S.gastosTC.filter(function(g) {
    if (g.tcId !== tcId) return false;
    var ciclo = getCicloCompra(tc, g.fechaCompra);
    var offset = diffMeses(ciclo.y, ciclo.m, y, m);
    return offset >= 0 && offset < g.cuotasTotal;
  }).map(function(g) {
    var ciclo = getCicloCompra(tc, g.fechaCompra);
    var offset = diffMeses(ciclo.y, ciclo.m, y, m);
    // A cuota is paid if pagadaHastaOffset is set and covers this offset
    var pagada = (g.pagadaHastaOffset !== undefined && g.pagadaHastaOffset !== null)
                 ? offset <= g.pagadaHastaOffset
                 : false; // if no explicit tracking, assume unpaid
    return {
      id: g.id, tcId: g.tcId, desc: g.desc,
      fechaCompra: g.fechaCompra,
      monto: g.monto,
      cuotasTotal: g.cuotasTotal,
      cuotaActual: offset + 1,
      pendientes: g.pendientes,
      montoCuota: g.montoCuota,
      esResumenAnterior: g.esResumenAnterior || false,
      pagada: pagada
    };
  });
}

function consumoTCMes(tcId, y, m) {
  // Only count cuotas not yet paid
  return getCuotasMes(tcId, y, m).filter(function(g){ return !g.pagada; }).reduce(function(s,g){ return s+g.montoCuota; }, 0);
}

function gastosTCMes(y, m) {
  return S.tarjetas.reduce(function(s,t){ return s + consumoTCMes(t.id, y, m); }, 0);
}

// Events
function eventsMes(y, m) {
  var evs = [];
  var sueldo = getSueldo(y, m);
  if (sueldo.getMonth() === m) evs.push({dia: sueldo, nombre: '\uD83D\uDCB0 ' + (S.config.ingresoNombre || 'Sueldo'), tipo: 'info', monto: S.config.sueldo, esReferencia: true});
  S.tarjetas.forEach(function(tc) {
    var c = getCierre(tc, y, m), v = getVence(tc, y, m);
    if (c && c.getMonth() === m) evs.push({dia: c, nombre: '\uD83D\uDCCB Cierre ' + tc.nombre, tipo: 'card', monto: null});
    if (v && v.getMonth() === m) {
      // Find the cycle this vencimiento belongs to (cuotas del ciclo que vence)
      // Vence is ~1 month after cierre, so consumo is for cycle (y, m-1) or so
      var cicloM = m - 1, cicloY = y;
      if (cicloM < 0) { cicloM = 11; cicloY--; }
      evs.push({dia: v, nombre: '\uD83D\uDCB3 Vto. ' + tc.nombre, tipo: 'pay', monto: consumoTCMes(tc.id, cicloY, cicloM)});
    }
  });
  S.prestamos.forEach(function(p) {
    if (p.cuotaN > p.cuotaTotal) return; // already paid off
    // Only show from the month the loan was taken
    if (p.fechaInicio) {
      var fi = new Date(p.fechaInicio + '-01');
      if (new Date(y, m, 1) < fi) return;
    }
    evs.push({dia: new Date(y, m, p.diaPago || 28), nombre: '\uD83C\uDFE6 ' + p.nombre, tipo: 'pay', monto: p.cuota});
  });
  S.compromisos.forEach(function(c) {
    evs.push({dia: new Date(y, m, c.diaMes), nombre: (c.tipo === 'ingreso' ? '\uD83D\uDCE5 ' : '\uD83D\uDCE4 ') + c.nombre, tipo: c.tipo === 'ingreso' ? 'income' : 'pay', monto: c.monto});
  });
  S.eventos.filter(function(e){ return e.mes === m && e.anio === y; }).forEach(function(e) {
    evs.push({dia: new Date(y, m, e.dia), nombre: (e.tipo === 'ingreso' ? '\uD83D\uDCE5 ' : '\uD83D\uDCE4 ') + e.nombre, tipo: e.tipo === 'ingreso' ? 'income' : 'pay', monto: e.monto, id: e.id, custom: true});
  });
  return evs.filter(function(e){ return e.dia && e.dia.getMonth() === m; }).sort(function(a, b){ return a.dia - b.dia; });
}
function proxEvs() {
  var nY = TM === 11 ? TY + 1 : TY, nM = TM === 11 ? 0 : TM + 1;
  var all = eventsMes(TY, TM).concat(eventsMes(nY, nM));
  return all.filter(function(e){ var d = dHasta(e.dia); return d >= 0 && d <= 30; }).sort(function(a, b){ return dHasta(a.dia) - dHasta(b.dia); });
}

function drawDonut(id, data, total) {
  setTimeout(function() {
    var el = document.getElementById(id); if (!el) return;
    var ctx = el.getContext('2d');
    var W = el.offsetWidth || 110, H = el.offsetHeight || 110;
    el.width = W; el.height = H;
    var cx = W / 2, cy = H / 2, R = Math.min(cx, cy) - 4, r = R * 0.54;
    ctx.clearRect(0, 0, W, H);
    if (!data || !data.length || !total) {
      ctx.fillStyle = 'rgba(42,54,80,.4)'; ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(26,34,53,.8)'; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      return;
    }
    var angle = -Math.PI / 2;
    data.forEach(function(d, i) {
      var slice = (d.v / total) * Math.PI * 2;
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, R, angle, angle + slice); ctx.closePath();
      ctx.fillStyle = d.color || CCOLORS[i % CCOLORS.length]; ctx.fill();
      angle += slice;
    });
    var isDark = !document.body.classList.contains('light-mode');
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = isDark ? '#1A2235' : '#F8FAFC'; ctx.fill();
  }, 40);
}

function drawBars(id, data, color) {
  setTimeout(function() {
    var el = document.getElementById(id); if (!el) return;
    var ctx = el.getContext('2d');
    var W = el.offsetWidth, H = 90; el.width = W; el.height = H;
    ctx.clearRect(0, 0, W, H);
    if (!data || !data.length) return;
    var max = Math.max.apply(null, data.concat([1]));
    var bw = Math.max(1, Math.floor(W / data.length) - 1);
    data.forEach(function(v, i) {
      var bh = Math.max(2, (v / max) * (H - 16));
      var x = i * (bw + 1);
      ctx.fillStyle = v > 0 ? (color || '#00C896') : 'rgba(42,54,80,.4)';
      if (ctx.roundRect) ctx.roundRect(x, H - bh - 2, bw, bh, [2, 2, 0, 0]);
      else ctx.rect(x, H - bh - 2, bw, bh);
      ctx.fill();
    });
    ctx.fillStyle = '#7A8BA8'; ctx.font = '8px Plus Jakarta Sans'; ctx.textAlign = 'center';
    data.forEach(function(_, i) { if ((i + 1) % 5 === 0 || i === 0) ctx.fillText(i + 1, i * (bw + 1) + bw / 2, H - 1); });
  }, 40);
}

function drawLine(id, dataArr, colors, refArr) {
  setTimeout(function() {
    var el = document.getElementById(id); if (!el) return;
    var ctx = el.getContext('2d');
    var W = el.offsetWidth, H = 75; el.width = W; el.height = H;
    ctx.clearRect(0, 0, W, H);
    if (!dataArr || !dataArr[0] || dataArr[0].length < 2) return;
    var allVals = [];
    dataArr.forEach(function(d) { allVals = allVals.concat(d); });
    if (refArr) allVals = allVals.concat(refArr);
    var max = Math.max.apply(null, allVals.concat([1]));
    var min = Math.min.apply(null, allVals.concat([0]));
    var range = max - min || 1;
    function pt(v, i, len) { return {x: i / (len - 1) * (W - 8) + 4, y: H - 10 - ((v - min) / range) * (H - 18)}; }
    dataArr.forEach(function(data, di) {
      var color = colors[di] || '#00C896';
      var pts = data.map(function(v, i) { return pt(v, i, data.length); });
      var grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, color + '30'); grad.addColorStop(1, color + '00');
      ctx.beginPath(); ctx.moveTo(pts[0].x, H);
      pts.forEach(function(p) { ctx.lineTo(p.x, p.y); });
      ctx.lineTo(pts[pts.length - 1].x, H); ctx.closePath();
      ctx.fillStyle = grad; ctx.fill();
      ctx.beginPath(); pts.forEach(function(p, i) { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
    });
    if (refArr) {
      var rpts = refArr.map(function(v, i) { return pt(v, i, refArr.length); });
      ctx.beginPath(); rpts.forEach(function(p, i) { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
      ctx.strokeStyle = 'rgba(122,139,168,.4)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);
    }
  }, 40);
}

function drawCashflow(id, data) {
  setTimeout(function() {
    var el = document.getElementById(id); if (!el) return;
    var ctx = el.getContext('2d');
    var W = el.offsetWidth, H = 90; el.width = W; el.height = H;
    ctx.clearRect(0, 0, W, H);
    if (!data || !data.length) return;
    var vals = data.map(function(d) { return d.saldo; });
    var max = Math.max.apply(null, vals.concat([1]));
    var min = Math.min.apply(null, vals.concat([0]));
    var range = max - min || 1;
    var zero_y = H - 10 - ((0 - min) / range) * (H - 18);
    // Zero line
    ctx.beginPath(); ctx.moveTo(4, zero_y); ctx.lineTo(W - 4, zero_y);
    ctx.strokeStyle = 'rgba(122,139,168,.3)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
    var pts = data.map(function(d, i) {
      return {x: i / (data.length - 1) * (W - 8) + 4, y: H - 10 - ((d.saldo - min) / range) * (H - 18), neg: d.negativo};
    });
    // Fill
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#00C89635'); grad.addColorStop(1, '#00C89600');
    ctx.beginPath(); ctx.moveTo(pts[0].x, zero_y);
    pts.forEach(function(p) { ctx.lineTo(p.x, p.y); });
    ctx.lineTo(pts[pts.length-1].x, zero_y); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();
    // Line
    ctx.beginPath();
    pts.forEach(function(p, i) {
      if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    });
    ctx.strokeStyle = '#00C896'; ctx.lineWidth = 2; ctx.stroke();
    // Red dots on negative days
    pts.forEach(function(p) {
      if (p.neg) {
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#F04438'; ctx.fill();
      }
    });
  }, 40);
}

function scoreRingHTML(score) {
  var color = score >= 70 ? 'var(--green)' : score >= 45 ? 'var(--yellow)' : 'var(--red)';
  var label = score >= 70 ? 'Excelente' : score >= 55 ? 'Bueno' : score >= 40 ? 'Regular' : 'Crítico';
  var circ = 2 * Math.PI * 30;
  var dash = (score / 100) * circ;
  return '<div class="score-ring">' +
    '<svg viewBox="0 0 80 80" fill="none">' +
      '<circle cx="40" cy="40" r="30" stroke="rgba(42,54,80,.6)" stroke-width="7"/>' +
      '<circle cx="40" cy="40" r="30" stroke="' + color + '" stroke-width="7" stroke-linecap="round" stroke-dasharray="' + dash.toFixed(1) + ' ' + (circ - dash).toFixed(1) + '"/>' +
    '</svg>' +
    '<div class="score-ring-label"><div class="score-num" style="color:' + color + '">' + score + '</div><div class="score-txt">/ 100</div></div>' +
  '</div>' +
  '<div style="flex:1"><div style="font-size:14px;font-weight:800;color:' + color + '">' + label + '</div>' +
    '<div style="font-size:10px;color:var(--dim);margin-top:4px">Score financiero personal</div>' +
    '<div style="font-size:10px;color:var(--dim);margin-top:8px">Basado en nivel de deuda, ahorro, liquidez y riesgo</div>' +
  '</div>';
}

var pinBuffer = '';

function switchAuthTab(tab) {
  authMode = tab;
  var isLogin = tab === 'login';
  document.getElementById('auth_tab_login').style.background = isLogin ? '#0EA5E9' : 'transparent';
  document.getElementById('auth_tab_login').style.color = isLogin ? '#fff' : '#666';
  document.getElementById('auth_tab_reg').style.background = !isLogin ? '#0EA5E9' : 'transparent';
  document.getElementById('auth_tab_reg').style.color = !isLogin ? '#fff' : '#666';
  document.getElementById('auth_btn').textContent = isLogin ? 'Iniciar sesion' : 'Registrarse';
  document.getElementById('auth_error').textContent = '';
}

async function doAuth() {
  var email = document.getElementById('auth_email').value.trim();
  var pass = document.getElementById('auth_pass').value;
  var errDiv = document.getElementById('auth_error');
  var btn = document.getElementById('auth_btn');
  if (!email || !pass) { errDiv.textContent = 'Completa email y contrasena'; return; }
  btn.textContent = 'Cargando...'; btn.disabled = true;
  try {
    var res;
    if (authMode === 'login') {
      res = await supabaseAuth.signIn(email, pass);
    } else {
      res = await supabaseAuth.signUp(email, pass);
    }
    if (res.error) throw res.error;
    currentUser = res.data.user || (res.data.session && res.data.session.user);
    if (!currentUser) {
      errDiv.textContent = 'Revisa tu email para confirmar la cuenta';
      btn.textContent = authMode === 'login' ? 'Iniciar sesion' : 'Registrarse';
      btn.disabled = false;
      return;
    }
    // Load cloud data
    var cloudData = await loadCloud();
    if (cloudData) {
      localStorage.setItem(KEY, JSON.stringify(cloudData));
    }
    entrarApp();
  } catch(e) {
    errDiv.textContent = e.message || 'Error de autenticacion';
    btn.textContent = authMode === 'login' ? 'Iniciar sesion' : 'Registrarse';
    btn.disabled = false;
  }
}

function usarSinCuenta() {
  currentUser = null;
  entrarApp();
}

function entrarApp() {
  var aw = document.getElementById('AUTH_WRAP');
  var apw = document.getElementById('APP_WRAP');
  if (aw) aw.style.display = 'none';
  if (apw) apw.style.display = 'block';

function pinKey(k) {
  var errDiv = document.getElementById('pin_error');
  errDiv.textContent = '';
  if (k === 'del') {
    pinBuffer = pinBuffer.slice(0, -1);
  } else if (pinBuffer.length < 4) {
    pinBuffer += k;
  }
  // Update dots
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('pd' + i);
    dot.style.background = i < pinBuffer.length ? '#0EA5E9' : '#2a3450';
  }
  if (pinBuffer.length === 4) {
    var savedPin = localStorage.getItem('finar_pin');
    if (!savedPin) {
      // First time setting PIN
      localStorage.setItem('finar_pin', pinBuffer);
      pinBuffer = '';
      document.getElementById('PIN_WRAP').style.display = 'none';
      entrarApp();
    } else if (pinBuffer === savedPin) {
      pinBuffer = '';
      document.getElementById('PIN_WRAP').style.display = 'none';
      document.getElementById('APP_WRAP').style.display = 'block';
      resetPinTimer();
    } else {
      errDiv.textContent = 'PIN incorrecto';
      pinBuffer = '';
      for (var j = 0; j < 4; j++) document.getElementById('pd' + j).style.background = '#2a3450';
    }
  }
}

var lastActiveTime = Date.now();
var PIN_TIMEOUT_MS = 2 * 60 * 1000; // 2 minutos

function resetPinTimer() {
  lastActiveTime = Date.now();
}

// Cuando la app vuelve al frente, verificar si paso el tiempo
// visibilitychange para browser
document.addEventListener('visibilitychange', function() {
  checkPinLock(document.visibilityState === 'visible');
});

// Capacitor App plugin para Android nativo
function initAppStateListener() {
  try {
    // Method 1: Capacitor v3+ plugins
    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
      window.Capacitor.Plugins.App.addListener('appStateChange', function(state) {
        checkPinLock(state.isActive);
      });
      console.log('App plugin listener registered via Capacitor.Plugins.App');
      return;
    }
    // Method 2: registerPlugin
    if (window.Capacitor && window.Capacitor.registerPlugin) {
      var AppPlugin = window.Capacitor.registerPlugin('App');
      AppPlugin.addListener('appStateChange', function(state) {
        checkPinLock(state.isActive);
      });
      console.log('App plugin listener registered via registerPlugin');
      return;
    }
    console.log('Capacitor App plugin not available');
  } catch(e) {
    console.log('App plugin error:', e.message);
  }
}

function checkPinLock(isActive) {
  console.log('appStateChange isActive=' + isActive);
  if (isActive) {
    var bgTime = parseInt(localStorage.getItem('finar_bg_time') || '0');
    var elapsed = bgTime > 0 ? (Date.now() - bgTime) : 0;
    var savedPin = localStorage.getItem('finar_pin');
    var pinWrap = document.getElementById('PIN_WRAP');
    var alreadyLocked = pinWrap && pinWrap.style.display === 'flex';
    console.log('elapsed=' + elapsed + ' savedPin=' + !!savedPin + ' alreadyLocked=' + alreadyLocked + ' timeout=' + PIN_TIMEOUT_MS);
    if (savedPin && !alreadyLocked && elapsed >= PIN_TIMEOUT_MS) {
      console.log('LOCKING APP');
      lockApp();
    } else {
      resetPinTimer();
    }
    localStorage.removeItem('finar_bg_time');
  } else {
    localStorage.setItem('finar_bg_time', Date.now().toString());
    lastActiveTime = Date.now();
    console.log('App went to background, saved time');
  }
}

async function initNotificaciones() {
  try {

async function programarNotificaciones() {
  if (!NotifPlugin) return;
  try {
    // Cancel all existing
    await NotifPlugin.cancel({notifications: [{id:1},{id:2},{id:3},{id:4},{id:5},{id:6},{id:7},{id:8},{id:9},{id:10}]});
    
    var notifs = [];
    var now = new Date();
    var id = 1;

    // ── Vencimientos de tarjetas ────────────────────────────────
    S.tarjetas.forEach(function(tc) {
      var vence = getVence(tc, now.getFullYear(), now.getMonth());
      if (!vence) return;
      var consumo = consumoTC(tc.id);
      if (consumo <= 0) return;
      // Notify 2 days before
      var notifDate = new Date(vence);
      notifDate.setDate(notifDate.getDate() - 2);
      notifDate.setHours(9, 0, 0, 0);
      if (notifDate > now) {
        notifs.push({
          id: id++,
          title: '\uD83D\uDCB3 Vence ' + tc.nombre,
          body: 'Vencimiento en 2 dias: ' + fmt(consumo) + '. No te olvides de pagarlo.',
          schedule: { at: notifDate },
          sound: 'default',
          smallIcon: 'ic_launcher'
        });
      }
      // Also notify on due date
      var dueDate = new Date(vence);
      dueDate.setHours(9, 0, 0, 0);
      if (dueDate > now) {
        notifs.push({
          id: id++,
          title: '\uD83D\uDEA8 HOY vence ' + tc.nombre,
          body: 'Pago pendiente: ' + fmt(consumo) + '. Evita recargos.',
          schedule: { at: dueDate },
          sound: 'default',
          smallIcon: 'ic_launcher'
        });
      }
    });

    // ── Vencimientos de préstamos ───────────────────────────────
    S.prestamos.filter(function(p){ return p.cuotaN <= p.cuotaTotal; }).forEach(function(p) {
      var diaPago = p.diaPago || 28;
      var fechaPago = new Date(now.getFullYear(), now.getMonth(), diaPago, 9, 0, 0);
      if (fechaPago <= now) {
        // Try next month
        fechaPago = new Date(now.getFullYear(), now.getMonth() + 1, diaPago, 9, 0, 0);
      }
      var notifDate = new Date(fechaPago);
      notifDate.setDate(notifDate.getDate() - 1);
      if (notifDate > now) {
        notifs.push({
          id: id++,
          title: '\uD83C\uDFE6 Cuota ' + p.nombre,
          body: 'Manana vence la cuota ' + p.cuotaN + ' de ' + p.cuotaTotal + ': ' + fmt(p.cuota),
          schedule: { at: notifDate },
          sound: 'default',
          smallIcon: 'ic_launcher'
        });
      }
    });

    // ── Recordatorio de cobro de sueldo ─────────────────────────
    var cobro = getSueldo(now.getFullYear(), now.getMonth());
    if (cobro > now) {
      var cobroNotif = new Date(cobro);
      cobroNotif.setHours(9, 0, 0, 0);
      notifs.push({
        id: id++,
        title: '\uD83D\uDCB0 ' + (S.config.ingresoNombre || 'Sueldo') + ' hoy',
        body: 'Hoy cobras ' + fmtK(S.config.sueldo) + '. No olvides registrarlo en FinAR Pro.',
        schedule: { at: cobroNotif },
        sound: 'default',
        smallIcon: 'ic_launcher'
      });
    }

    // ── Alertas de presupuesto ─────────────────────────────────
    if (S.presupuestos && S.presupuestos.length > 0) {
      S.presupuestos.forEach(function(p) {
        var gastadoCat = movsDelMes(now.getFullYear(), now.getMonth())
          .filter(function(m){ return m.tipo==='gasto' && m.cat===p.cat && m.cat!=='Transferencia'; })
          .reduce(function(s,m){ return s+m.monto; }, 0);
        var pct = p.limite > 0 ? (gastadoCat / p.limite * 100) : 0;
        if (pct >= 80 && pct < 100) {
          notifs.push({
            id: id++,
            title: 'Presupuesto ' + p.cat + ' al ' + pct.toFixed(0) + '%',
            body: 'Gastaste ' + fmtK(gastadoCat) + ' de ' + fmtK(p.limite) + ' en ' + p.cat + '. Cuidado!',
            schedule: { at: new Date(Date.now() + 5000) },
            sound: 'default',
            smallIcon: 'ic_launcher'
          });
        } else if (pct >= 100) {
          notifs.push({
            id: id++,
            title: 'Superaste el presupuesto de ' + p.cat,
            body: 'Gastaste ' + fmtK(gastadoCat) + ' de ' + fmtK(p.limite) + '. Limite superado!',
            schedule: { at: new Date(Date.now() + 5000) },
            sound: 'default',
            smallIcon: 'ic_launcher'
          });
        }
      });
    }

    if (notifs.length > 0) {
      await NotifPlugin.schedule({ notifications: notifs });
      console.log('Notificaciones programadas: ' + notifs.length);
    }
  } catch(e) {
    console.log('Error programando notifs:', e.message);
  }
}

  var _aw = document.getElementById('AUTH_WRAP');
  var _apw = document.getElementById('APP_WRAP');
  if (_aw) _aw.style.display = 'flex';
  if (_apw) _apw.style.display = 'none';

  // Detectar callback de Google OAuth
  if (await handleOAuthCallback()) {
    // Viene de Google, ya tiene token — entrar directo
    try {
      var cloudData = await loadCloud();
      if (cloudData) {
        localStorage.setItem(KEY, JSON.stringify(cloudData));
        // Recargar S desde el nuevo localStorage
        try {
          var raw2 = localStorage.getItem(KEY);
          if (raw2) S = JSON.parse(raw2);
        } catch(e2) {}
      }
      var savedPin = localStorage.getItem('finar_pin');
      if (savedPin) {
        var aw2 = document.getElementById('AUTH_WRAP');
        if (aw2) aw2.style.display = 'none';
        lockApp();
      } else {
        entrarApp();
      }
    } catch(e) {
      console.log('OAuth callback error:', e.message);
      entrarApp();
    }
    return;
  }

  var hasSupabase = initSupabase();
  if (!hasSupabase) {
    // Supabase SDK not available - show login with offline option only
    console.log('Supabase SDK no disponible');
    return;
  }

  // Try to restore existing session (with timeout)
  try {
    var sessionPromise = Promise.resolve(supabaseAuth.getSession());
    var timeoutPromise = new Promise(function(res) { setTimeout(function() { res(null); }, 3000); });
    var result = await Promise.race([sessionPromise, timeoutPromise]);
    
    if (result && result.data && result.data.session) {
      currentUser = result.data.session.user;
      var cloudData = await loadCloud();
      if (cloudData) {
        localStorage.setItem(KEY, JSON.stringify(cloudData));
        try { S = JSON.parse(JSON.stringify(cloudData)); } catch(e) {}
      }
      var savedPin = localStorage.getItem('finar_pin');
      if (savedPin) {
        document.getElementById('AUTH_WRAP').style.display = 'none';
        lockApp();
      } else {
        entrarApp();
      }
    }
    // If no session, stay on auth screen
  } catch(e) {
    console.log('Error al verificar sesion:', e.message);
    // Stay on auth screen
  }
});

function generarAnalisisMes(ci) {
  // ci = cierre del mes a analizar
  var cierres = S.cierresMes.slice().sort(function(a,b){return a.anio!==b.anio?a.anio-b.anio:a.mes-b.mes;});
  var idx = cierres.findIndex(function(c){return c.anio===ci.anio && c.mes===ci.mes;});
  var prev = idx > 0 ? cierres[idx-1] : null;
  var insights = [];

  // ── 1. Resultado del mes ─────────────────────────────────────────────────
  if (ci.resultado >= 0) {
    insights.push({tipo:'g', icon:'OK',
      titulo: 'Mes positivo: ahorraste ' + fmtK(ci.resultado),
      msg: 'Tus ingresos superaron tus gastos y compromisos. ' +
           'Representa el ' + (ci.ingresos > 0 ? (ci.resultado/ci.ingresos*100).toFixed(0) : 0) + '% de tus ingresos.'
    });
  } else {
    insights.push({tipo:'r', icon:'!',
      titulo: 'Mes negativo: deficit de ' + fmtK(Math.abs(ci.resultado)),
      msg: 'Gastaste mas de lo que ingresaste. Revisa tus gastos variables para el proximo mes.'
    });
  }

  // ── 2. Comparacion con mes anterior ─────────────────────────────────────
  if (prev) {
    var diffGas = ci.gastos - prev.gastos;
    var diffIng = ci.ingresos - prev.ingresos;
    var pctGas = prev.gastos > 0 ? (diffGas/prev.gastos*100).toFixed(0) : 0;
    var pctIng = prev.ingresos > 0 ? (diffIng/prev.ingresos*100).toFixed(0) : 0;
    if (diffGas > 0) {
      insights.push({tipo: diffGas > prev.gastos*0.2 ? 'r' : 'y', icon:'!',
        titulo: 'Gastos subieron ' + pctGas + '% vs ' + MC[prev.mes],
        msg: 'De ' + fmtK(prev.gastos) + ' a ' + fmtK(ci.gastos) + '. Diferencia: +' + fmtK(diffGas) + '.'
      });
    } else {
      insights.push({tipo:'g', icon:'OK',
        titulo: 'Gastos bajaron ' + Math.abs(pctGas) + '% vs ' + MC[prev.mes],
        msg: 'De ' + fmtK(prev.gastos) + ' a ' + fmtK(ci.gastos) + '. Ahorraste ' + fmtK(Math.abs(diffGas)) + ' mas.'
      });
    }
    if (diffIng !== 0) {
      insights.push({tipo: diffIng >= 0 ? 'g' : 'y', icon: diffIng >= 0 ? 'OK' : '!',
        titulo: 'Ingresos ' + (diffIng >= 0 ? 'subieron' : 'bajaron') + ' ' + Math.abs(pctIng) + '% vs ' + MC[prev.mes],
        msg: 'De ' + fmtK(prev.ingresos) + ' a ' + fmtK(ci.ingresos) + '.'
      });
    }
  }

  // ── 3. Categoria con mayor gasto ─────────────────────────────────────────
  var cats = catGastos(ci.anio, ci.mes);
  if (cats.length > 0) {
    var top = cats[0];
    var pctTop = ci.gastos > 0 ? (top.v/ci.gastos*100).toFixed(0) : 0;
    insights.push({tipo:'b', icon:'i',
      titulo: top.n + ' fue tu mayor gasto (' + pctTop + '%)',
      msg: 'Gastaste ' + fmtK(top.v) + ' en ' + top.n + ' de un total de ' + fmtK(ci.gastos) + ' en gastos.'
    });
  }

  // ── 4. Ratio deuda/ingreso ───────────────────────────────────────────────
  var ratioDeuda = ci.ingresos > 0 ? (ci.compromisos / ci.ingresos * 100).toFixed(0) : 0;
  if (ratioDeuda > 40) {
    insights.push({tipo:'r', icon:'!',
      titulo: 'Compromisos consumen el ' + ratioDeuda + '% de tus ingresos',
      msg: 'El limite recomendado es 35%. Considerar cancelar deuda anticipadamente.'
    });
  } else if (ratioDeuda > 25) {
    insights.push({tipo:'y', icon:'!',
      titulo: 'Compromisos en ' + ratioDeuda + '% de ingresos',
      msg: 'Nivel moderado. Evita tomar nuevas deudas este mes.'
    });
  } else {
    insights.push({tipo:'g', icon:'OK',
      titulo: 'Compromisos controlados: ' + ratioDeuda + '% de ingresos',
      msg: 'Estas dentro del limite recomendado del 35%.'
    });
  }

  // ── 5. Tendencia de saldo ────────────────────────────────────────────────
  if (cierres.length >= 3) {
    var ultimos3 = cierres.slice(-3);
    var tendencia = ultimos3[2].saldoFinal - ultimos3[0].saldoFinal;
    if (tendencia > 0) {
      insights.push({tipo:'g', icon:'OK',
        titulo: 'Tu patrimonio crecio ' + fmtK(tendencia) + ' en 3 meses',
        msg: 'Tendencia positiva. Seguí así para alcanzar tus metas de ahorro.'
      });
    } else {
      insights.push({tipo:'y', icon:'!',
        titulo: 'Tu patrimonio bajo ' + fmtK(Math.abs(tendencia)) + ' en 3 meses',
        msg: 'Revisa tus gastos recurrentes y busca reducir los variables.'
      });
    }
  }

  // ── 6. Recomendacion concreta ────────────────────────────────────────────
  var libres = ci.resultado;
  if (libres > 50000) {
    var sugerido = Math.round(libres * 0.5);
    insights.push({tipo:'b', icon:'i',
      titulo: 'Podes invertir hasta ' + fmtK(sugerido) + ' este mes',
      msg: 'Con tu saldo libre de ' + fmtK(libres) + ', destinar el 50% a CEDEARs o cancelar deuda anticipada.'
    });
  }

  return insights;
}

      if (cierresChart.length >= 2) {
        var W = 340, H = 120, padL = 8, padR = 8, padT = 16, padB = 28;
        var wInner = W - padL - padR, hInner = H - padT - padB;
        var saldos = cierresChart.map(function(c){ return c.saldoFinal; });
        var ingresos = cierresChart.map(function(c){ return c.ingresos; });
        var gastos = cierresChart.map(function(c){ return c.gastos; });
        var allVals = saldos.concat(ingresos).concat(gastos);
        var minV = Math.min.apply(null, allVals.filter(function(v){return v>0;}).concat([0]));
        var maxV = Math.max.apply(null, allVals) * 1.1;
        var range = maxV - minV || 1;
        var n = cierresChart.length;
        function px(i){ return padL + (i / (n-1)) * wInner; }
        function py(v){ return padT + hInner - ((v - minV) / range) * hInner; }
        // Build polyline points
        function pts(arr){ return arr.map(function(v,i){ return px(i)+','+py(v); }).join(' '); }

        // Grid lines
        for (var gi = 0; gi <= 3; gi++) {
          var gy = padT + (gi/3)*hInner;
          var gv = maxV - (gi/3)*(maxV-minV);
          svgChart += '<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';

        // Ingresos line (green, dashed)
